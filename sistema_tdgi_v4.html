<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Controle de OS · TDGI · Hospital Edmundo Vasconcelos</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root {
  --ok:        oklch(0.55 0.11 155);
  --ok-bg:     oklch(0.96 0.04 155);
  --ok-soft:   oklch(0.62 0.09 145);
  --ok-soft-bg:oklch(0.95 0.03 145);
  --info:      oklch(0.55 0.13 245);
  --info-bg:   oklch(0.96 0.04 245);
  --teal:      oklch(0.55 0.10 195);
  --teal-bg:   oklch(0.96 0.03 195);
  --amber:     oklch(0.7 0.12 85);
  --amber-bg:  oklch(0.96 0.05 85);
  --orange:    oklch(0.65 0.16 50);
  --orange-bg: oklch(0.96 0.06 50);
  --danger:    oklch(0.55 0.18 25);
  --danger-bg: oklch(0.96 0.05 25);
  --red:       var(--danger);
  --green:     var(--ok);
  --blue:      var(--info);
  --purple:    oklch(0.5 0.16 290);
  --purple-bg: oklch(0.96 0.04 290);
  --pink:      oklch(0.6 0.16 350);
  --pink-bg:   oklch(0.96 0.04 350);
  --slate:     oklch(0.55 0.015 250);
  --slate-bg:  oklch(0.96 0.005 250);
  --warn:      var(--orange);

  --bg:        oklch(0.985 0.003 85);
  --surface:   #ffffff;
  --surface-2: oklch(0.975 0.003 85);
  --surface-3: oklch(0.96 0.003 85);
  --border:    oklch(0.92 0.005 85);
  --border-strong: oklch(0.88 0.005 85);
  --text:      oklch(0.22 0.008 260);
  --text-2:    oklch(0.42 0.008 260);
  --muted:     oklch(0.58 0.005 260);
  --muted-2:   oklch(0.72 0.005 260);

  --sb-bg:     oklch(0.22 0.012 250);
  --sb-bg-2:   oklch(0.18 0.012 250);
  --sb-text:   oklch(0.82 0.01 250);
  --sb-muted:  oklch(0.6 0.01 250);
  --sb-on-bg:  oklch(0.3 0.025 250);
  --sb-on-fg:  #ffffff;

  --brand-mark:    var(--accent, oklch(0.55 0.13 245));
  --brand-mark-fg: #fff;

  --accent:    oklch(0.55 0.13 245);
  --accent-bg: oklch(0.96 0.04 245);

  --ff-sans: 'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --ff-mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  --row-h: 38px;
  --pad-card: 18px;
  --gap-grid: 14px;
  --fs-base: 13px;
  --fs-table: 12.5px;
}

[data-density="compact"] {
  --row-h: 32px; --pad-card: 14px; --gap-grid: 10px;
  --fs-base: 12.5px; --fs-table: 12px;
}
[data-density="comfy"] {
  --row-h: 44px; --pad-card: 22px; --gap-grid: 18px;
  --fs-base: 13.5px; --fs-table: 13px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--ff-sans);
  font-size: var(--fs-base);
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "cv11";
}
button { font-family: inherit; }
.mono, .os-id, .row-time, .row-time-sub, .gut-score, .kpi-value, .sup-stat-v,
.tb-now-v, .tb-period-v, .pie-total-val, .recent-id, .hbar-val, .gut-card-val,
.gut-bigscore-v, .qk-v, .exec-kpi-value, .perf-v { font-family: var(--ff-mono); font-variant-numeric: tabular-nums; }

#root { height: 100%; }
.app { text-transform: uppercase; }
.app input, .app textarea, .app select { text-transform: uppercase; }
.chat-area, .chat-area * { text-transform: none !important; }

.muted-sm { font-size: 11px; color: var(--muted); }
.ok-text { color: var(--ok); }
.danger-text { color: var(--danger); }
.warn-text { color: var(--orange); }
.trend-up { color: var(--ok); font-weight: 500; font-size: 11px; }
.trend-down { color: var(--danger); }

/* ============================================================
   APP SHELL
   ============================================================ */
.app { display: grid; grid-template-columns: 236px 1fr; height: 100vh; min-height: 0; --sb-w: 236px; }
.app:has(.sidebar-compact) { grid-template-columns: 64px 1fr; --sb-w: 64px; }
.main { display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--bg); }
.main-scroll { flex: 1; min-height: 0; overflow-y: auto; }

/* ============================================================
   SIDEBAR
   ============================================================ */
.sidebar {
  background: var(--sb-bg);
  color: var(--sb-text);
  display: flex; flex-direction: column;
  padding: 14px 10px;
  border-right: 1px solid oklch(0.15 0.012 250);
  overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent;
}
.sb-brand { display: flex; align-items: center; gap: 10px; padding: 6px 6px 18px; }
.sb-mark { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 7px; flex-shrink: 0; }
.sb-brand-text { line-height: 1.15; }
.sb-brand-name { font-weight: 600; color: #fff; font-size: 13.5px; letter-spacing: -0.005em; }
.sb-brand-sub { color: var(--sb-muted); font-size: 11px; }

.sb-nav { display: flex; flex-direction: column; gap: 1px; flex: 1; }
.sb-group-label {
  font-size: 9.5px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--sb-muted); padding: 14px 10px 6px;
}
.sb-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 8px 4px; }

.sb-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  background: transparent; border: 0; color: var(--sb-text);
  text-align: left; font-size: 12.5px; font-weight: 500;
  border-radius: 6px; cursor: pointer;
  text-decoration: none;
}
.sidebar-compact .sb-item { justify-content: center; padding: 9px; }
.sb-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.sb-item-on, .sb-item-on:hover { background: var(--sb-on-bg); color: var(--sb-on-fg); }
.sb-icon { display: flex; opacity: 0.85; flex-shrink: 0; }
.sb-badge {
  margin-left: auto;
  font-size: 8.5px; font-weight: 700; letter-spacing: 0.1em;
  padding: 2px 5px; border-radius: 3px;
  background: var(--accent); color: #fff;
}
.sb-item-external { color: var(--sb-muted); }
.sb-item-external:hover { color: #fff; }
.sb-ext { margin-left: auto; font-size: 10px; }

.sb-foot { display: flex; flex-direction: column; gap: 8px; padding-top: 12px; margin-top: 8px;
  border-top: 1px solid oklch(0.28 0.012 250); }
.sb-sharepoint { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 7px; background: rgba(255,255,255,0.04); }
.sp-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); flex-shrink: 0;
  box-shadow: 0 0 0 3px oklch(0.55 0.11 155 / 0.2); animation: pulse 2.4s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
.sp-name { font-size: 11.5px; color: #fff; font-weight: 500; }
.sp-sub { color: var(--sb-muted) !important; }

.sb-user { display: flex; align-items: center; gap: 9px; padding: 4px 6px; }
.sb-user-av { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), oklch(0.45 0.16 280));
  color: #fff; font-size: 11.5px; font-weight: 600; display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-mono); letter-spacing: 0.02em; }
.sb-user-n { font-size: 12.5px; color: #fff; font-weight: 500; }
.sb-user-r { color: var(--sb-muted) !important; }

/* ============================================================
   TOPBAR
   ============================================================ */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.tb-title { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.012em; color: var(--text); }
.tb-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
.tb-actions { display: flex; align-items: center; gap: 10px; }
.tb-period, .tb-export {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; cursor: pointer; color: var(--text); font-size: 12.5px;
}
.tb-period:hover, .tb-export:hover { border-color: var(--border-strong); }
.tb-period-v { font-weight: 500; }
.tb-export { background: var(--text); color: #fff; border-color: var(--text); }
.tb-divider { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }
.tb-now { text-align: right; line-height: 1.2; }
.tb-now-v { font-weight: 600; font-size: 13px; }
.tb-now-l { font-size: 10.5px; color: var(--muted); }

/* ============================================================
   VIEW + PANELS
   ============================================================ */
.view { padding: 20px 24px 40px; display: flex; flex-direction: column; gap: var(--gap-grid); }
.view-h { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }

.panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  overflow: hidden; display: flex; flex-direction: column;
}
.panel-hd {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 14px var(--pad-card) 10px; gap: 12px;
}
.panel-title { margin: 0; font-size: 13.5px; font-weight: 600; letter-spacing: -0.005em; }
.panel-sub { color: var(--muted); font-size: 11.5px; margin-top: 2px; }
.panel-body { padding: 0 var(--pad-card) var(--pad-card); }
.panel-body-flush { padding: 0; }

/* grids */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--gap-grid); }
.kpi-row:has(> :nth-child(5)) { grid-template-columns: repeat(5, 1fr); }
.kpi-row:has(> :nth-child(6)) { grid-template-columns: repeat(6, 1fr); }
.kpi-row-sm .kpi-card { padding: 14px 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap-grid); }
.grid-pie { display: grid; grid-template-columns: 1.4fr 1fr; gap: var(--gap-grid); }

/* ============================================================
   KPI CARDS
   ============================================================ */
.kpi-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 20px; display: flex; flex-direction: column; gap: 4px;
  position: relative; overflow: hidden;
}
.kpi-card[data-accent]::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); }
.kpi-card[data-accent="green"]::before { background: var(--ok); }
.kpi-card[data-accent="blue"]::before { background: var(--info); }
.kpi-card[data-accent="red"]::before { background: var(--danger); }
.kpi-card[data-accent="orange"]::before { background: var(--orange); }
.kpi-card[data-accent="amber"]::before { background: var(--amber); }
.kpi-card[data-accent="teal"]::before { background: var(--teal); }
.kpi-card[data-accent="purple"]::before { background: var(--purple); }
.kpi-label { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.01em; text-transform: uppercase; }
.kpi-value { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; margin-top: 2px; }
.kpi-sub { font-size: 11.5px; color: var(--text-2); margin-top: 2px; }
.kpi-spark { margin-top: 8px; opacity: 0.8; }

/* ============================================================
   PILLS / BADGES / TAGS
   ============================================================ */
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 8px; font-size: 11.5px; font-weight: 500;
  border-radius: 4px; white-space: nowrap; letter-spacing: 0.005em;
}
.pill-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.pill-emoji { font-size: 11px; }
.people-pill { font-size: 10.5px; padding: 2px 7px; }

.gut-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 2px 7px 2px 5px; border-radius: 4px; font-size: 11px; font-weight: 500;
}
.gut-badge .gut-score { font-family: var(--ff-mono); font-weight: 600; font-size: 11.5px;
  background: rgba(255,255,255,0.7); padding: 0 5px; border-radius: 3px; letter-spacing: -0.01em; }
.gut-label { font-size: 11px; }

.spec-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); }
.spec-glyph { font-family: var(--ff-mono); font-size: 9px; font-weight: 600;
  padding: 2px 4px; border-radius: 3px; background: var(--surface-3); color: var(--text-2); letter-spacing: 0.04em; }

/* ============================================================
   AVATAR
   ============================================================ */
.avatar-wrap { position: relative; flex-shrink: 0; }
.avatar {
  border-radius: 50%; background: var(--surface-3); color: var(--text);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-mono); font-size: 10.5px; font-weight: 600;
}
.avatar-status {
  position: absolute; bottom: -1px; right: -1px;
  width: 9px; height: 9px; border-radius: 50%;
  border: 2px solid var(--surface);
}
.avatar-status[data-tone="green"] { background: var(--ok); }
.avatar-status[data-tone="amber"] { background: var(--amber); }
.avatar-status[data-tone="orange"]{ background: var(--orange); }
.avatar-status[data-tone="red"]   { background: var(--danger); }
.avatar-status[data-tone="purple"]{ background: var(--purple); }
.avatar-status[data-tone="blue"]  { background: var(--info); }
.avatar-status[data-tone="teal"]  { background: var(--teal); }
.avatar-status[data-tone="pink"]  { background: var(--pink); }
.avatar-status[data-tone="slate"] { background: var(--muted); }

/* ============================================================
   GUT CARDS
   ============================================================ */
.gut-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.gut-card { display: flex; flex-direction: column; gap: 6px; padding: 12px 14px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
  text-align: left; cursor: pointer; position: relative; overflow: hidden; }
.gut-card:hover { border-color: var(--border-strong); background: var(--surface-3); }
.gut-card-hd { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
.gut-card-label { font-size: 12px; font-weight: 600; }
.gut-card-sla { font-size: 10px; color: var(--muted); text-align: right; }
.gut-card-val { font-size: 28px; font-weight: 600; font-family: var(--ff-mono); letter-spacing: -0.02em; line-height: 1; }
.gut-card-pct { font-size: 10.5px; color: var(--muted); }
.gut-card-bar { height: 3px; background: var(--surface-3); border-radius: 2px; overflow: hidden; margin-top: 4px; }
.gut-card-bar span { display: block; height: 100%; }
.gut-red    .gut-card-label, .gut-red    .gut-card-val { color: var(--danger); }
.gut-red    .gut-card-bar span { background: var(--danger); }
.gut-orange .gut-card-label, .gut-orange .gut-card-val { color: var(--orange); }
.gut-orange .gut-card-bar span { background: var(--orange); }
.gut-amber  .gut-card-label, .gut-amber  .gut-card-val { color: var(--amber); }
.gut-amber  .gut-card-bar span { background: var(--amber); }
.gut-green  .gut-card-label, .gut-green  .gut-card-val { color: var(--ok); }
.gut-green  .gut-card-bar span { background: var(--ok); }

/* ============================================================
   CHARTS
   ============================================================ */
.hbar-list { display: flex; flex-direction: column; gap: 6px; }
.hbar-row { display: grid; grid-template-columns: 200px 1fr auto; gap: 12px; align-items: center;
  padding: 5px 6px; border-radius: 5px; background: transparent; border: 0; text-align: left; font-size: 12px; }
.hbar-row:hover { background: var(--surface-2); }
.hbar-label { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hbar-track { height: 8px; background: var(--surface-3); border-radius: 4px; overflow: hidden; }
.hbar-fill { display: block; height: 100%; border-radius: 4px; transition: width .25s; }
.hbar-val { font-family: var(--ff-mono); font-size: 12px; font-weight: 500;
  display: inline-flex; gap: 6px; align-items: baseline; justify-content: flex-end; }
.hbar-pct { color: var(--muted); font-size: 10.5px; font-weight: 400; }
.crit-tag { font-size: 9px; padding: 1px 4px; border-radius: 3px;
  background: var(--danger-bg); color: var(--danger); margin-left: 6px;
  letter-spacing: 0.02em; text-transform: uppercase; font-weight: 500; }

.pie-flex { display: grid; grid-template-columns: 220px 1fr; gap: 4px; align-items: center;
  padding: 12px var(--pad-card) 16px; }
.pie-total-val { font-family: var(--ff-mono); font-size: 22px; font-weight: 600; fill: var(--text); }
.pie-total-lbl { font-size: 10px; fill: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
.pie-legend { display: flex; flex-direction: column; }
.pie-legend-row { display: grid; grid-template-columns: 14px 1fr auto auto; gap: 10px; align-items: center;
  padding: 5px 8px; border-radius: 5px; background: transparent; border: 0; font-size: 12px; text-align: left; cursor: pointer; }
.pie-legend-row:hover { background: var(--surface-2); }
.pie-swatch { width: 8px; height: 8px; border-radius: 2px; }
.pie-leg-label { color: var(--text); }
.pie-leg-val { font-family: var(--ff-mono); font-weight: 600; font-variant-numeric: tabular-nums; }
.pie-leg-pct { font-size: 10.5px; color: var(--muted); width: 32px; text-align: right; }

/* ============================================================
   SUPERVISOR / EQUIPE
   ============================================================ */
.sup-list { display: flex; flex-direction: column; gap: 4px; }
.sup-row { display: grid; grid-template-columns: 36px 1fr 120px 38px; gap: 12px; align-items: center;
  padding: 8px 8px; background: transparent; border: 0; border-radius: 6px; text-align: left; cursor: pointer; }
.sup-row:hover { background: var(--surface-2); }
.sup-info { display: flex; flex-direction: column; }
.sup-name { font-size: 12.5px; font-weight: 500; display: flex; gap: 8px; align-items: center; }
.sup-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.sup-bar { height: 5px; background: var(--surface-3); border-radius: 3px; overflow: hidden; }
.sup-bar-fill { display: block; height: 100%; background: var(--accent); border-radius: 3px; }
.sup-pct { font-family: var(--ff-mono); font-size: 12px; font-weight: 600; text-align: right; }

/* recent / dash suggestions */
.recent-list { display: flex; flex-direction: column; gap: 2px; }
.recent-row { display: grid; grid-template-columns: 86px 1fr 130px auto 70px; align-items: center; gap: 10px;
  padding: 7px 8px; border-radius: 5px; background: transparent; border: 0; text-align: left; cursor: pointer; font-size: 12px; }
.recent-row:hover { background: var(--surface-2); }
.recent-id { font-family: var(--ff-mono); font-size: 11px; color: var(--text-2); }
.recent-desc { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.recent-sector { font-size: 11px; color: var(--muted); }
.recent-time { font-size: 11px; color: var(--muted); text-align: right; }

.dash-suggestions { display: flex; flex-direction: column; gap: 6px; }
.dash-sug { display: grid; grid-template-columns: 22px 1fr auto; gap: 10px; align-items: center;
  padding: 8px 10px; background: var(--surface-2); border-radius: 6px; font-size: 12px; }
.dash-sug-ic { font-size: 14px; }
.dash-sug-text { color: var(--text); }
.dash-sug-os { font-family: var(--ff-mono); font-size: 11px; color: var(--muted); }
.dash-sug-risco { background: var(--danger-bg); }
.dash-sug-risco .dash-sug-text { color: var(--danger); }
.dash-sug-bumerangue { background: var(--purple-bg); }

.btn-ghost-sm { background: transparent; border: 0; padding: 4px 8px; font-size: 11.5px;
  color: var(--accent); font-weight: 500; border-radius: 5px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 5px; }
.btn-ghost-sm:hover { background: var(--accent-bg); }
.btn-primary-sm { display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; background: var(--text); color: #fff; border: 0;
  border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; }
.btn-primary-sm:hover { background: #000; }
.btn-secondary-sm { display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; background: var(--surface); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; }
.btn-secondary-sm:hover { background: var(--surface-2); }

/* ============================================================
   TABLE
   ============================================================ */
.table-view { gap: 12px; }
.table-filterbar { display: flex; flex-direction: column; gap: 10px;
  padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.search-wrap { position: relative; display: flex; align-items: center; }
.search-wrap svg { position: absolute; left: 12px; color: var(--muted); pointer-events: none; }
.search-input { flex: 1; width: 100%; padding: 8px 12px 8px 34px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 7px; outline: 0;
  font: inherit; font-size: 13px; }
.search-input:focus { border-color: var(--accent); background: var(--surface); }
.chip-group { display: flex; flex-wrap: nowrap; gap: 5px; align-items: center; overflow-x: auto; padding-bottom: 2px; }
.chip-group::-webkit-scrollbar { height: 3px; }
.chip-group::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.chip-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
.chip-line-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
  color: var(--muted); min-width: 86px; flex-shrink: 0; }

.chip { display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 5px; cursor: pointer; font-size: 11.5px; color: var(--text-2); white-space: nowrap; }
.chip:hover { border-color: var(--border-strong); color: var(--text); }
.chip-on { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); font-weight: 500; }
.chip-count { font-family: var(--ff-mono); font-size: 10.5px; opacity: 0.7; padding-left: 4px;
  border-left: 1px solid currentColor; margin-left: 2px;
  border-color: color-mix(in oklch, currentColor 30%, transparent); }

.filter-meta { display: flex; align-items: center; justify-content: space-between; padding-top: 4px; }

.os-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.os-table { width: 100%; border-collapse: collapse; font-size: var(--fs-table); }
.os-table thead th { position: sticky; top: 0; z-index: 1; text-align: left;
  font-weight: 500; color: var(--muted); font-size: 10.5px; letter-spacing: 0.04em; text-transform: uppercase;
  padding: 9px 10px; background: var(--surface-2); border-bottom: 1px solid var(--border); }
.th-sort { background: transparent; border: 0; padding: 0; font: inherit; color: inherit; cursor: pointer;
  display: inline-flex; align-items: center; gap: 5px; letter-spacing: inherit; text-transform: inherit; }
.th-sort:hover { color: var(--text); }
.th-on { color: var(--text); }
.th-arrow { font-size: 12px; color: var(--accent); }
.th-right { float: right; }
.th-center { text-align: center; }

.os-table tbody td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.os-table tbody tr { cursor: pointer; }
.os-table tbody tr:hover { background: var(--surface-2); }
.os-table tbody tr:last-child td { border-bottom: 0; }
.td-center { text-align: center; }
.td-right { text-align: right; }

.os-id { font-family: var(--ff-mono); font-size: 11.5px; font-weight: 500; color: var(--text-2); letter-spacing: -0.005em; }
.os-flag { display: inline-block; font-family: var(--ff-mono); font-size: 9px; font-weight: 600;
  margin-left: 5px; padding: 1px 4px; border-radius: 3px; background: var(--accent-bg); color: var(--accent); vertical-align: middle; }

/* Selo de conferência — verde (editada), azul (nova), vermelha (problema) */
.selo-conf { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-left: 6px; vertical-align: middle; flex-shrink: 0; }
.selo-ok { background: var(--ok); box-shadow: 0 0 0 2px var(--ok-bg); }
.selo-nova { background: #3b82f6; box-shadow: 0 0 0 2px #dbeafe; animation: pulse-selo 2s infinite; }
.selo-revisar { background: var(--danger); box-shadow: 0 0 0 2px var(--danger-bg); animation: pulse-selo 2s infinite; }
@keyframes pulse-selo { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
tr.os-nova { background: #eff6ff !important; }
tr.os-nova:hover { background: #dbeafe !important; }

.row-sector { font-weight: 500; display: flex; align-items: center; gap: 6px; }
.row-desc { color: var(--muted); font-size: 11.5px; margin-top: 1px; display: flex; align-items: center; gap: 8px; }
.row-transfer-hint { font-size: 10px; padding: 1px 6px; border-radius: 3px;
  background: var(--purple-bg); color: var(--purple); font-weight: 500; }
.crit-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); flex-shrink: 0; }

.executor-name { font-size: 12px; white-space: pre-line; }
.sup-mini { display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 50%; background: var(--surface-3);
  font-family: var(--ff-mono); font-size: 10px; font-weight: 600; color: var(--text-2); }

.row-time { font-family: var(--ff-mono); font-size: 11.5px; }
.row-time-sub { font-family: var(--ff-mono); font-size: 10px; color: var(--muted); }
.row-attach { display: inline-flex; align-items: center; gap: 6px; }
.att-sig { font-family: var(--ff-mono); font-size: 10px; font-weight: 600;
  color: var(--ok); background: var(--ok-bg); padding: 1px 5px; border-radius: 3px; }
.att-photo { color: var(--muted); display: inline-flex; align-items: center; gap: 3px; font-family: var(--ff-mono); font-size: 10px; }
.att-pdf { color: var(--danger); display: inline-flex; }

.table-foot, .table-empty { padding: 14px 16px; font-size: 11.5px; color: var(--muted);
  background: var(--surface-2); border-top: 1px solid var(--border); text-align: center; }
.table-empty { padding: 60px 16px; }

/* ============================================================
   EQUIPE
   ============================================================ */
.equipe-view { gap: 18px; }
.equipe-hd { display: flex; align-items: baseline; gap: 14px; }
.sup-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap-grid); }
.sup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px; display: flex; flex-direction: column; gap: 14px; }
.sup-card-hd { display: flex; align-items: center; gap: 12px; }
.sup-card-name { font-size: 14px; font-weight: 600; letter-spacing: -0.005em; }
.sup-card-role { font-size: 11.5px; color: var(--muted); margin-top: 1px; margin-bottom: 4px; }
.sup-card-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
  border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
.sup-stat { padding: 10px 12px; text-align: left; border-right: 1px solid var(--border); }
.sup-stat:last-child { border-right: 0; }
.sup-stat-v { font-size: 18px; font-weight: 600; line-height: 1; font-family: var(--ff-mono); letter-spacing: -0.02em; }
.sup-stat-l { font-size: 10.5px; color: var(--muted); margin-top: 3px; }
.sup-card-areas { display: flex; flex-wrap: wrap; gap: 8px; }

.tech-list { display: flex; flex-direction: column; border-top: 1px solid var(--border); padding-top: 10px; }
.tech-row { display: grid; grid-template-columns: 28px 1fr 130px 60px 80px 26px; gap: 10px; align-items: center;
  padding: 6px 0; background: transparent; border: 0; text-align: left; cursor: pointer; font-size: 12px;
  border-bottom: 1px solid var(--border); }
.tech-row:last-child { border-bottom: 0; }
.tech-row:hover { background: var(--surface-2); }
.tech-name-block { display: flex; flex-direction: column; min-width: 0; }
.tech-name { font-size: 12px; }
.tech-note { font-size: 10px; color: var(--muted); }
.tech-spec { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 11px; }
.spec-dot { width: 6px; height: 6px; border-radius: 50%; }
.tech-prv { font-family: var(--ff-mono); font-size: 10.5px; color: var(--muted); text-align: center; }
.tech-mini-bar { height: 4px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
.tech-mini-fill { display: block; height: 100%; background: var(--accent); }
.tech-num { font-family: var(--ff-mono); font-weight: 600; font-size: 12px; text-align: right; }

/* ============================================================
   DRAWER
   ============================================================ */
.drawer-scrim { position: fixed; inset: 0; background: oklch(0.2 0.005 250 / 0.4); z-index: 999;
  animation: scrim-in .15s ease; }
@keyframes scrim-in { from { opacity: 0 } to { opacity: 1 } }
.drawer { position: fixed; top: 50%;
  left: calc(var(--sb-w, 236px) / 2 + 50%);
  transform: translate(-50%, -50%);
  width: min(1200px, calc(96vw - var(--sb-w, 236px)));
  max-height: 94vh;
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  display: flex; flex-direction: column; z-index: 1000;
  box-shadow: 0 24px 80px rgba(0,0,0,0.22);
  animation: drawer-in .26s cubic-bezier(.2,.8,.2,1); }
@keyframes drawer-in {
  from { transform: translate(-50%, -50%) scale(0.92); opacity: 0; }
  to   { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
}

.drawer-hd { display: flex; gap: 12px; align-items: flex-start; justify-content: space-between;
  padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
.drawer-pretitle { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.os-id.big { font-size: 13px; font-weight: 600; color: var(--text); }
.badge-client { font-size: 10px; padding: 2px 6px; border-radius: 3px;
  background: var(--accent-bg); color: var(--accent); font-weight: 500; }
.drawer-title { margin: 0 0 8px; font-size: 17px; font-weight: 600; letter-spacing: -0.01em; text-wrap: pretty; }
.drawer-meta-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.sector-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); }
.drawer-x { background: transparent; border: 1px solid var(--border); width: 30px; height: 30px;
  border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-2); flex-shrink: 0; }
.drawer-x:hover { background: var(--surface-2); color: var(--text); }

.drawer-body { flex: 1; overflow-y: auto; padding: 0 28px 28px; min-height: 0; }
.drawer-section { padding: 18px 0; border-bottom: 1px solid var(--border); }
.drawer-section:last-child { border-bottom: 0; }
.ds-label { font-size: 10.5px; letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--muted); font-weight: 500; margin-bottom: 12px; }
.ds-mini { font-size: 10.5px; color: var(--muted); }

.gut-detail { display: grid; grid-template-columns: 140px 1fr 1fr; gap: 18px; align-items: center; }
.gut-bigscore { text-align: center; padding: 16px; border-radius: 10px; border: 1px solid currentColor; }
.gut-red.gut-bigscore    { color: var(--danger); background: var(--danger-bg); }
.gut-orange.gut-bigscore { color: var(--orange); background: var(--orange-bg); }
.gut-amber.gut-bigscore  { color: var(--amber);  background: var(--amber-bg); }
.gut-green.gut-bigscore  { color: var(--ok);     background: var(--ok-bg); }
.gut-bigscore-v { font-size: 36px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
.gut-bigscore-l { font-size: 12px; font-weight: 600; margin-top: 6px; }

.gut-breakdown { display: flex; flex-direction: column; gap: 8px; }
.gut-dim { display: grid; grid-template-columns: 86px 1fr 36px; gap: 10px; align-items: center; }
.gut-dim-l { font-size: 12px; color: var(--text-2); }
.gut-dim-pips { display: flex; gap: 3px; }
.pip { width: 14px; height: 5px; border-radius: 1.5px; background: var(--surface-3); }
.pip-on { background: var(--accent); }
.gut-dim-v { font-family: var(--ff-mono); font-size: 11.5px; color: var(--muted); }
.gut-formula { font-family: var(--ff-mono); font-size: 11px; color: var(--muted); padding-top: 4px; }
.gut-sla-v { font-size: 14px; font-weight: 600; margin-top: 4px; }

.kv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
.kv-l { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
.kv-v { font-size: 13px; font-weight: 500; }

.closure-steps { display: flex; flex-direction: column; gap: 8px; }
.closure-step { display: grid; grid-template-columns: 28px 1fr auto; gap: 12px; align-items: center;
  padding: 10px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 7px; }
.closure-done { background: var(--surface); border-color: var(--ok); }
.closure-icon { width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
  background: var(--surface-3); color: var(--muted); font-weight: 600; }
.closure-done .closure-icon { background: var(--ok); color: #fff; }
.closure-label { font-size: 12.5px; font-weight: 500; }
.closure-role { font-size: 11px; color: var(--muted); margin-top: 1px; }
.closure-mark { font-size: 11.5px; color: var(--muted); }
.closure-done .closure-mark { color: var(--ok); font-weight: 500; }
.closure-stamp { font-family: var(--ff-mono); font-size: 11px; font-weight: 700; padding: 4px 8px;
  border: 1.5px solid var(--danger); color: var(--danger); border-radius: 3px;
  transform: rotate(-3deg); letter-spacing: 0.04em; }
.closure-done .closure-stamp { border-color: var(--ok); color: var(--ok); }

.photo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.photo-thumb { aspect-ratio: 4 / 3; overflow: hidden; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface-3); }
.empty-block { padding: 24px; text-align: center; border: 1px dashed var(--border);
  border-radius: 8px; color: var(--muted); font-size: 12px; }

.file-list { display: flex; flex-direction: column; gap: 6px; }
.file-row { display: grid; grid-template-columns: 28px 1fr 20px; gap: 12px; align-items: center;
  padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 7px; text-decoration: none; color: inherit; }
.file-row:hover { border-color: var(--accent); background: var(--accent-bg); }
.file-ic { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px;
  border-radius: 4px; background: var(--surface); color: var(--danger); }
.file-name { font-size: 12.5px; font-weight: 500; }
.file-path { font-size: 10.5px; color: var(--muted); font-family: var(--ff-mono); margin-top: 1px; }
.file-act { color: var(--muted); }

.timeline { display: flex; flex-direction: column; gap: 10px; }
.tl-row { display: grid; grid-template-columns: 24px 1fr; gap: 10px; align-items: flex-start; }
.tl-icon { display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%; background: var(--surface-3); color: var(--text-2); font-size: 11px; }
.tl-label { font-size: 12.5px; font-weight: 500; }
.tl-time { font-size: 10.5px; color: var(--muted); font-family: var(--ff-mono); margin-top: 2px; }

.drawer-ft { display: flex; gap: 10px; justify-content: flex-end;
  padding: 14px 24px; border-top: 1px solid var(--border); background: var(--surface-2); }
.btn-secondary, .btn-primary { display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 7px; font: inherit; font-size: 12.5px; font-weight: 500; cursor: pointer; }
.btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { background: var(--surface-3); }
.btn-primary { background: var(--text); color: #fff; border: 1px solid var(--text); }
.btn-primary:hover { background: #000; }

/* ============================================================
   PLANEJADOR
   ============================================================ */
.planejador-hd, .gestao-hd, .compras-hd, .supervisao-hd, .agenda-hd, .altas-hd,
.import-hd, .planilhas-hd, .prog-hd {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 4px;
}
.planejador-hd > div:first-child, .gestao-hd > div:first-child { flex: 0 0 auto; }
.auto-toggle { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.seg { display: inline-flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 7px; padding: 2px; gap: 2px; }
.seg button { padding: 5px 11px; background: transparent; border: 0; cursor: pointer; font-size: 11.5px;
  border-radius: 5px; color: var(--text-2); }
.seg .seg-on { background: var(--surface); color: var(--text); font-weight: 500; box-shadow: 0 1px 2px rgba(0,0,0,.05); }

.plan-tabs { display: flex; gap: 4px; background: var(--surface-2); padding: 3px;
  border-radius: 8px; border: 1px solid var(--border); }
.plan-tabs button { padding: 6px 12px; background: transparent; border: 0; cursor: pointer;
  font-size: 12px; font-weight: 500; color: var(--text-2); border-radius: 5px; }
.plan-tabs .plan-tab-on { background: var(--surface); color: var(--text);
  box-shadow: 0 1px 2px rgba(0,0,0,.05); }

/* Quadro Vivo */
.quadro { display: flex; flex-direction: column; gap: var(--gap-grid); }
.quadro-kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.qk { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; }
.qk-v { font-size: 22px; font-weight: 600; line-height: 1; }
.qk-l { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 6px; }

.quadro-grid { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: var(--gap-grid); }
.qpanel { min-height: 360px; }
.live-list { display: flex; flex-direction: column; gap: 8px; }
.live-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px; text-align: left; cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
.live-card:hover { border-color: var(--danger); background: var(--danger-bg); }
.live-card-hd { display: flex; align-items: center; justify-content: space-between; }
.live-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  color: var(--danger); background: var(--danger-bg); padding: 2px 6px; border-radius: 3px; }
.live-time { font-size: 10px; color: var(--muted); font-family: var(--ff-mono); }
.live-desc { font-size: 12.5px; font-weight: 500; }
.live-sector { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.live-foot { display: flex; align-items: center; gap: 8px; }

/* Hierarquia */
.hier { display: flex; flex-direction: column; gap: 4px; }
.hier-group-label { font-size: 9.5px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); padding: 10px 8px 4px; }
.hier-row { display: grid; grid-template-columns: 28px 1fr auto; gap: 10px; align-items: center;
  padding: 7px 8px; border-radius: 6px; }
.hier-row:hover { background: var(--surface-2); }
.hier-self { background: var(--accent-bg); }
.hier-name { font-size: 12.5px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.hier-self-tag { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
  background: var(--accent); color: #fff; letter-spacing: 0.1em; }
.hier-role { font-size: 10.5px; }
.hier-status { font-size: 10.5px; display: inline-flex; align-items: center; gap: 4px; color: var(--text-2); }

/* Mensagens dos técnicos */
.msg-list { display: flex; flex-direction: column; gap: 10px; }
.msg-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.msg-aguardando { border-left: 3px solid var(--orange); }
.msg-hd { display: flex; align-items: center; gap: 10px; }
.msg-tech { font-weight: 600; font-size: 12px; }
.msg-os { font-family: var(--ff-mono); font-size: 10.5px; color: var(--muted); }
.msg-time { font-size: 10px; color: var(--muted); margin-left: auto; }
.msg-transcript { font-size: 12px; font-style: italic; color: var(--text-2);
  background: var(--surface); padding: 8px 10px; border-radius: 5px; margin: 8px 0;
  display: flex; gap: 6px; }
.msg-quote-ic { flex-shrink: 0; }
.msg-actions { display: flex; gap: 6px; }
.msg-act { padding: 4px 10px; font-size: 11px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 5px; cursor: pointer; }
.msg-act:hover { background: var(--surface-3); }
.msg-act-primary { background: var(--text); color: #fff; border-color: var(--text); }

/* Linha do tempo live */
.timeline-live { display: flex; flex-direction: column; }
.tl-live-row { display: grid; grid-template-columns: 50px 22px 80px 1fr; gap: 10px; align-items: center;
  padding: 6px 4px; border-bottom: 1px solid var(--border); font-size: 12px; }
.tl-live-row:last-child { border-bottom: 0; }
.tl-live-time { font-family: var(--ff-mono); font-size: 10.5px; color: var(--muted); }
.tl-live-ic { font-size: 14px; }
.tl-live-who { font-size: 11px; color: var(--text-2); font-weight: 500; }
.tl-live-label { font-size: 12px; }
.tl-live-ia .tl-live-who { color: var(--accent); }

/* Team strip */
.quadro-team-grid { display: grid; grid-template-columns: 1fr 2fr; gap: var(--gap-grid); }
.team-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.team-strip-wide { grid-template-columns: repeat(4, 1fr); }
.tech-card { display: grid; grid-template-columns: 32px 1fr auto; gap: 8px; align-items: center;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
.tech-card.status-faltou, .tech-card.status-ferias, .tech-card.status-atestado { opacity: 0.55; }
.tech-card-name { font-size: 12px; font-weight: 500; line-height: 1.2; }
.tech-card-spec { font-size: 10.5px; color: var(--muted); display: flex; align-items: center; gap: 4px; margin-top: 2px; }
.tech-card-status { font-size: 14px; }

/* Kanban */
.fluxo-controls { display: flex; justify-content: space-between; align-items: center; padding: 0 4px; }
.kanban { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; min-height: 60vh; padding-bottom: 8px; }
.kb-col { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; min-height: 400px; min-width: 0; }
.kb-col-hd { display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-bottom: 1px solid var(--border); }
.kb-col-title { font-size: 12.5px; font-weight: 600; }
.kb-col-hint { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
.kb-col-count { font-family: var(--ff-mono); font-size: 11px; font-weight: 600;
  padding: 2px 7px; background: var(--surface); border-radius: 10px; }
.kb-list { padding: 10px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; }
.kb-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 12px; text-align: left; cursor: pointer;
  display: flex; flex-direction: column; gap: 6px; }
.kb-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.kb-card-critico { border-left: 3px solid var(--danger); }
.kb-card-alto    { border-left: 3px solid var(--orange); }
.kb-card-medio   { border-left: 3px solid var(--amber); }
.kb-card-baixo   { border-left: 3px solid var(--ok); }
.kb-card-hd { display: flex; align-items: center; justify-content: space-between; }
.kb-card-id { font-family: var(--ff-mono); font-size: 10.5px; color: var(--muted); }
.kb-card-desc { font-size: 12px; line-height: 1.3; }
.kb-card-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.kb-card-exec { font-size: 10.5px; color: var(--muted); }
.kb-card-flag { font-size: 9.5px; padding: 2px 5px; border-radius: 3px;
  background: var(--danger-bg); color: var(--danger); font-weight: 500;
  align-self: flex-start; text-transform: uppercase; letter-spacing: 0.02em; }

/* Botão "Avançar" pulsando no modo Híbrido — a IA sugere a ação */
@keyframes btnGlowPulse {
  0%   { box-shadow: 0 0 0 0 rgba(41,128,185,0.55); transform: scale(1); }
  70%  { box-shadow: 0 0 0 8px rgba(41,128,185,0); transform: scale(1.04); }
  100% { box-shadow: 0 0 0 0 rgba(41,128,185,0); transform: scale(1); }
}
.btn-glow {
  background: #2980b9 !important; color: #fff !important;
  border-color: #2980b9 !important;
  animation: btnGlowPulse 1.4s ease-out infinite;
}

/* Sugestões */
.sug-progress { display: grid; grid-template-columns: 200px 1fr auto; gap: 14px; align-items: center;
  padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.sug-progress-l { font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.sug-progress-bar { height: 8px; background: var(--surface-3); border-radius: 4px; overflow: hidden; }
.sug-progress-fill { height: 100%; background: linear-gradient(to right, var(--accent), oklch(0.6 0.16 280)); border-radius: 4px; }
.sug-progress-v { font-family: var(--ff-mono); font-weight: 600; font-size: 13px; }

.sug-list { display: flex; flex-direction: column; gap: 6px; }
.sug-row { display: grid; grid-template-columns: 86px 1fr auto 90px 50px auto auto; gap: 10px; align-items: center;
  padding: 8px 10px; background: var(--surface-2); border-radius: 6px; font-size: 12px; }
.sug-os { font-family: var(--ff-mono); font-size: 11px; color: var(--text); font-weight: 500; }
.sug-desc { color: var(--text-2); }
.sug-arrow { color: var(--muted); font-size: 14px; }
.sug-target { font-size: 11.5px; color: var(--accent); font-weight: 500; }
.sug-conf { font-family: var(--ff-mono); font-size: 10.5px; color: var(--muted); text-align: right; }
.sug-act { padding: 4px 10px; font-size: 11px; background: var(--text); color: #fff;
  border: 0; border-radius: 5px; cursor: pointer; }
.sug-act-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }

.sug-mini-list { display: flex; flex-direction: column; gap: 6px; }
.sug-mini-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center;
  padding: 8px 10px; background: var(--surface-2); border-radius: 6px; font-size: 12px; }
.sug-mini-text { color: var(--text-2); }

.sug-risk-list { display: flex; flex-direction: column; gap: 6px; }
.sug-risk { display: grid; grid-template-columns: 22px 1fr auto; gap: 10px; align-items: center;
  padding: 10px 12px; background: var(--danger-bg); border: 1px solid var(--danger);
  border-radius: 6px; font-size: 12px; }
.sug-risk-ic { font-size: 14px; }
.sug-risk-text { color: var(--danger); font-weight: 500; }

.sug-program { display: flex; gap: 14px; align-items: center; padding: 4px; }
.sug-program-text { font-size: 12.5px; color: var(--text-2); flex: 1; line-height: 1.5; }

/* Programar dia */
.prog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.prog-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.prog-card-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.prog-card-name { font-size: 13px; font-weight: 600; }
.prog-card-spec { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; margin-top: 2px; }
.prog-slots { display: flex; flex-direction: column; gap: 4px; }
.prog-slot { display: grid; grid-template-columns: 50px 1fr; gap: 8px; align-items: center;
  font-size: 11.5px; padding: 4px 8px; background: var(--surface); border-radius: 5px; }
.prog-slot-time { font-family: var(--ff-mono); color: var(--muted); }
.prog-slot-os { font-family: var(--ff-mono); }
.prog-foot { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; margin-top: 10px; border-top: 1px solid var(--border); }

/* ============================================================
   GESTÃO
   ============================================================ */
.exec-kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.exec-kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
.exec-kpi-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.exec-kpi-value { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; margin-top: 4px; }
.exec-kpi-sub { font-size: 10.5px; color: var(--text-2); margin-top: 4px; }

.alert-list { display: flex; flex-direction: column; gap: 6px; }
.alert-row { display: grid; grid-template-columns: 28px 1fr auto; gap: 12px; align-items: center;
  padding: 10px 14px; border: 1px solid var(--border); border-radius: 7px;
  background: var(--surface-2); }
.alert-warn { background: var(--amber-bg); border-color: var(--amber); }
.alert-danger { background: var(--danger-bg); border-color: var(--danger); }
.alert-ic { font-size: 16px; }
.alert-text { font-size: 12.5px; }

.perf-list { display: flex; flex-direction: column; gap: 8px; }
.perf-row { display: grid; grid-template-columns: 36px 1fr auto; gap: 14px; align-items: center;
  padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface-2); }
.perf-star { background: linear-gradient(to right, var(--amber-bg), var(--surface-2)); border-color: var(--amber); }
.perf-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.star-tag { font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em;
  padding: 2px 6px; background: var(--amber); color: #fff; border-radius: 3px; }
.perf-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.perf-stats { display: flex; gap: 24px; }
.perf-stats > div { text-align: center; }
.perf-v { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
.perf-l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 4px; }

.insights { display: flex; flex-direction: column; gap: 6px; }
.insight-row { display: grid; grid-template-columns: 24px 1fr; gap: 10px;
  padding: 10px 12px; background: var(--surface-2); border-radius: 6px; font-size: 12.5px; line-height: 1.5; }
.insight-ic { font-size: 16px; }

/* Tabela de Horas Trabalhadas */
.horas-table { display: flex; flex-direction: column; gap: 1px; }
.horas-thead { display: grid;
  grid-template-columns: minmax(220px, 1.4fr) 60px 80px 80px 70px 80px minmax(180px, 1.2fr);
  gap: 12px; align-items: center;
  padding: 8px 12px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
  border-bottom: 1px solid var(--border); }
.horas-th-right { text-align: right; }
.horas-row { display: grid;
  grid-template-columns: minmax(220px, 1.4fr) 60px 80px 80px 70px 80px minmax(180px, 1.2fr);
  gap: 12px; align-items: center;
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  font-size: 12.5px; transition: background 0.15s; }
.horas-row:hover { background: var(--surface-2); }
.horas-row-top { background: linear-gradient(to right, var(--amber-bg), transparent 60%); }
.horas-row-top:hover { background: linear-gradient(to right, var(--amber-bg), var(--surface-2) 60%); }
.horas-c-name { display: flex; align-items: center; gap: 10px; }
.horas-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; }
.horas-sub { font-size: 10.5px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; }
.horas-cell { text-align: right; font-size: 13px; }
.horas-bar-wrap { display: flex; align-items: center; gap: 8px; }
.horas-bar-track { flex: 1; height: 8px; background: var(--surface-3); border-radius: 4px; overflow: hidden; }
.horas-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.horas-bar-val { font-family: var(--ff-mono); font-size: 12px; font-weight: 600; min-width: 56px; text-align: right; }

@media (max-width: 1100px) {
  .horas-thead, .horas-row {
    grid-template-columns: minmax(180px, 1.4fr) 50px 70px 70px 80px minmax(140px, 1fr);
  }
  .horas-thead > *:nth-child(4), .horas-row > *:nth-child(4) { display: none; }
}

/* Construtor de relatórios */
.rel-overall { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; }
.rel-overall-bar { height: 8px; background: var(--surface-3); border-radius: 4px; overflow: hidden; }
.rel-overall-fill { height: 100%; background: var(--accent); border-radius: 4px; }
.rel-grid { display: grid; grid-template-columns: 320px 1fr; gap: var(--gap-grid); }

.rel-topics { display: flex; flex-direction: column; gap: 2px; }
.rel-topic { display: grid; grid-template-columns: 24px 1fr 70px 32px; gap: 8px; align-items: center;
  padding: 8px 10px; background: transparent; border: 0; cursor: pointer;
  text-align: left; font-size: 12px; border-radius: 5px; }
.rel-topic:hover { background: var(--surface-2); }
.rel-topic-on { background: var(--accent-bg); }
.rel-topic-n { font-family: var(--ff-mono); font-size: 11px; color: var(--muted);
  width: 22px; height: 22px; border-radius: 4px; background: var(--surface); display: flex;
  align-items: center; justify-content: center; font-weight: 600; }
.rel-topic-name { color: var(--text); }
.rel-topic-bar { height: 4px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
.rel-topic-bar span { display: block; height: 100%; }
.rel-topic-pct { font-family: var(--ff-mono); font-size: 10.5px; text-align: right; color: var(--muted); }
.rel-add { padding: 8px 10px; background: transparent; border: 1px dashed var(--border);
  border-radius: 5px; cursor: pointer; color: var(--muted); font-size: 12px; }
.rel-add:hover { color: var(--accent); border-color: var(--accent); }

.rel-questions { display: flex; flex-direction: column; gap: 16px; }
.rel-q { display: grid; grid-template-columns: 26px 1fr; gap: 10px; }
.rel-q-ic { font-size: 16px; }
.rel-q-text { font-size: 13px; font-weight: 500; margin-bottom: 8px; }
.rel-q-options { display: flex; gap: 6px; flex-wrap: wrap; }
.rel-q-opt { padding: 5px 12px; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 5px; cursor: pointer; font-size: 12px; }
.rel-q-opt-on { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); font-weight: 500; }
.rel-q-input { width: 100%; padding: 8px 10px; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 6px; font: inherit; font-size: 12.5px;
  outline: 0; resize: vertical; min-height: 60px; }
.rel-q-input:focus { border-color: var(--accent); }
.rel-q-pills { display: flex; gap: 5px; flex-wrap: wrap; }
.rel-q-pill { padding: 3px 8px; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 12px; font-size: 11px; cursor: pointer; }
.rel-q-pill-on { background: var(--accent); color: #fff; border-color: var(--accent); }
.rel-q-foot { display: flex; justify-content: flex-end; gap: 8px; padding-top: 10px; }

/* Chat estratégico */
.chat-est { display: flex; flex-direction: column; gap: 10px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; padding: 16px; min-height: 70vh; }
.chat-est-body { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; padding: 4px; }
.chat-msg { display: flex; }
.chat-gestor { justify-content: flex-end; }
.chat-bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.45; }
.chat-gestor .chat-bubble { background: var(--accent); color: #fff; }
.chat-ia .chat-bubble { background: var(--surface-2); }
.chat-bubble-text { }
.chat-chart { margin-top: 8px; padding: 24px; background: rgba(255,255,255,0.5);
  border: 1px dashed currentColor; border-radius: 6px; font-family: var(--ff-mono);
  font-size: 11px; text-align: center; opacity: 0.7; }
.chat-time { font-size: 10px; opacity: 0.6; margin-top: 6px; }

.chat-suggestions { padding: 12px 4px; }
.chat-sug-chip { padding: 5px 10px; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 14px; font-size: 11.5px; cursor: pointer; }
.chat-sug-chip:hover { border-color: var(--accent); color: var(--accent); }

.chat-input { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; padding-top: 10px;
  border-top: 1px solid var(--border); }
.chat-input input { padding: 10px 14px; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 7px; outline: 0; font: inherit; font-size: 13px; }
.chat-input input:focus { border-color: var(--accent); }

/* ============================================================
   COMPRAS
   ============================================================ */
.compras-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: var(--gap-grid); }
.mat-list { display: flex; flex-direction: column; gap: 6px; }
.mat-row { display: grid; grid-template-columns: 80px 80px 1fr 120px 130px 60px; gap: 10px; align-items: center;
  padding: 12px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 7px; }
.mat-id { font-family: var(--ff-mono); font-size: 11.5px; font-weight: 600; }
.mat-os { font-family: var(--ff-mono); font-size: 11px; color: var(--accent); }
.mat-item-name { font-size: 13px; font-weight: 500; }
.mat-item-sub { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
.mat-urg { font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em;
  text-align: center; padding: 3px 6px; border-radius: 3px; }
.mat-urg-critico { background: var(--danger); color: #fff; }
.mat-urg-alto { background: var(--orange); color: #fff; }
.mat-urg-medio { background: var(--amber); color: #fff; }
.mat-urg-baixo { background: var(--ok); color: #fff; }

.compr-chat { display: flex; flex-direction: column; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 8px; padding: 12px; gap: 8px; }

.estoque-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.est-card { padding: 14px 16px; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 8px; border-left: 4px solid var(--border); }
.est-card-name { font-size: 12.5px; font-weight: 500; }
.est-card-qty { font-family: var(--ff-mono); font-size: 22px; font-weight: 600; margin-top: 4px; }
.est-card-bar { height: 4px; background: var(--surface-3); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.est-card-bar span { display: block; height: 100%; }
.est-card-status { font-size: 11px; font-weight: 500; margin-top: 6px; }

/* ============================================================
   SUPERVISÃO
   ============================================================ */
.team-status-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.tstat { display: grid; grid-template-columns: 36px 1fr auto; gap: 10px; align-items: center;
  padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 7px; }
.tstat-faltou, .tstat-ferias, .tstat-atestado, .tstat-folga { opacity: 0.7; }
.tstat-name { font-size: 12.5px; font-weight: 500; }
.tstat-role { margin-top: 1px; }
.tstat-status { font-size: 10.5px; color: var(--text-2); }

.bday-list { display: flex; flex-direction: column; gap: 8px; }
.bday-row { display: grid; grid-template-columns: 30px 60px 1fr; gap: 12px; align-items: center;
  padding: 8px 10px; background: var(--surface-2); border-radius: 6px; }
.bday-emoji { font-size: 18px; }
.bday-date { font-family: var(--ff-mono); font-size: 11.5px; color: var(--muted); }
.bday-tag { font-size: 9px; padding: 2px 6px; border-radius: 3px;
  background: var(--accent); color: #fff; letter-spacing: 0.05em; margin-left: 6px; }

/* ============================================================
   AGENDA / CALENDAR
   ============================================================ */
.calendar { background: var(--surface); }
.cal-hd { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--border); }
.cal-dow { padding: 10px 12px; font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted); font-weight: 500; text-align: center; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-cell { min-height: 90px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: 6px 8px; display: flex; flex-direction: column; gap: 4px; }
.cal-cell:nth-child(7n) { border-right: 0; }
.cal-cell-off { background: var(--surface-2); opacity: 0.5; }
.cal-cell-today { background: var(--accent-bg); }
.cal-num { font-family: var(--ff-mono); font-size: 12px; color: var(--text-2); }
.cal-cell-today .cal-num { color: var(--accent); font-weight: 700; }
.cal-events { display: flex; flex-direction: column; gap: 2px; }
.cal-event { display: flex; align-items: center; gap: 5px; font-size: 10px;
  padding: 2px 5px; background: var(--surface-2); border-radius: 3px; }
.cal-event-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.cal-event-t { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-more { font-size: 9.5px; color: var(--muted); padding: 2px 5px; }

/* ============================================================
   ALTAS
   ============================================================ */
.andar-filter { display: flex; gap: 6px; margin-bottom: 14px; }
.andar-btn { padding: 6px 12px; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer; font-size: 12px; }
.andar-on { background: var(--accent); color: #fff; border-color: var(--accent); }

.leitos-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; padding: 4px 0; }
.leito { display: flex; flex-direction: column; align-items: center; justify-content: center;
  aspect-ratio: 1; border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
  background: var(--surface-2); position: relative; cursor: default; }
.leito-num { font-family: var(--ff-mono); font-size: 11px; font-weight: 600; color: var(--text-2); }
.leito-state { font-size: 11px; margin-top: 2px; }
.leito-ocupado         { background: oklch(0.96 0.04 155); border-color: var(--ok); }
.leito-alta_solicitada { background: oklch(0.96 0.05 85);  border-color: var(--amber); }
.leito-em_vistoria     { background: oklch(0.96 0.04 245); border-color: var(--info); }
.leito-retrofit        { background: oklch(0.96 0.06 50);  border-color: var(--orange); }
.leito-liberado        { background: oklch(0.96 0.03 195); border-color: var(--teal); }
.leito-mini { width: 22px; aspect-ratio: 1; padding: 0; font-size: 9px; }
.leito-mini .leito-num { display: none; }

.leitos-legend { display: flex; gap: 16px; flex-wrap: wrap; padding-top: 14px;
  margin-top: 14px; border-top: 1px solid var(--border); font-size: 11.5px; color: var(--text-2); }
.leitos-legend-item { display: inline-flex; align-items: center; gap: 6px; }

/* ============================================================
   IMPORTAÇÃO
   ============================================================ */
.import-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap-grid); }
.imp-card { background: var(--surface); border: 2px dashed var(--border); border-radius: 10px;
  padding: 22px; position: relative; display: flex; flex-direction: column; gap: 10px; }
.imp-card:hover { border-color: var(--accent); }
.imp-badge { position: absolute; top: 10px; right: 10px; font-size: 9.5px; font-weight: 700;
  letter-spacing: 0.1em; padding: 2px 6px; border-radius: 3px;
  background: var(--accent); color: #fff; }
.imp-icon { font-size: 32px; }
.imp-title { font-size: 14px; font-weight: 600; }
.imp-desc { font-size: 11.5px; color: var(--muted); line-height: 1.5; }
.imp-drop { display: flex; flex-direction: column; align-items: center; gap: 6px;
  margin-top: auto; padding: 14px; background: var(--surface-2); border-radius: 6px; }

/* ============================================================
   PLANILHAS
   ============================================================ */
.pl-list { display: flex; flex-direction: column; gap: 4px; }
.pl-row { display: grid; grid-template-columns: 28px 1fr 80px 110px auto; gap: 14px; align-items: center;
  padding: 11px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; }
.pl-row:hover { background: var(--surface-3); }
.pl-icon { color: var(--ok); }
.pl-name { font-size: 13px; font-weight: 500; }
.pl-rows { font-size: 11.5px; color: var(--muted); }
.pl-actions { display: flex; gap: 4px; }
.pl-add { padding: 12px 14px; background: transparent; border: 1px dashed var(--border);
  border-radius: 6px; cursor: pointer; color: var(--muted); font-size: 12.5px; }
.pl-add:hover { color: var(--accent); border-color: var(--accent); }

.pl-create { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
.pl-create-input { padding: 12px 14px; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 7px; outline: 0; font: inherit; font-size: 13px; min-height: 70px; resize: vertical; }

/* ============================================================
   MODO PROGRAMADOR
   ============================================================ */
.prog-layout { display: grid; grid-template-columns: 1fr 320px; gap: var(--gap-grid); height: calc(100vh - 220px); }
.prog-chat { display: flex; flex-direction: column; gap: 10px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
  overflow: hidden; min-height: 0; }
.prog-side { display: flex; flex-direction: column; gap: var(--gap-grid); overflow-y: auto; }
.prog-exemplo { padding: 7px 10px; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 5px; cursor: pointer; font-size: 11.5px; color: var(--text-2); text-align: left;
  font-style: italic; }
.prog-exemplo:hover { border-color: var(--accent); color: var(--text); }
.prog-caps { display: flex; flex-direction: column; gap: 4px; }
.prog-cap { font-size: 12px; color: var(--text-2); padding: 4px 0; }

/* ============================================================
   CONFIG (resp map)
   ============================================================ */
.config-view .panel { max-width: 920px; }
.def-table { width: 100%; border-collapse: collapse; }
.def-table th { text-align: left; padding: 8px 10px; font-size: 10.5px; color: var(--muted);
  font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
.def-table td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.def-table tr:last-child td { border-bottom: 0; }

.resp-map { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.resp-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.resp-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.resp-name { font-size: 13px; font-weight: 600; }
.resp-specs, .resp-team { margin-top: 10px; }
.resp-team-list { display: flex; flex-direction: column; gap: 2px; margin-top: 4px; }
.resp-tech { font-size: 11.5px; padding: 2px 0; }

.mode-cards { display: flex; flex-direction: column; gap: 8px; }
.mode-card { display: grid; grid-template-columns: 22px 1fr; gap: 12px; align-items: flex-start;
  padding: 12px 14px; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 7px; cursor: pointer; }
.mode-on { background: var(--accent-bg); border-color: var(--accent); }
.mode-card input { margin-top: 4px; }
.mode-name { font-size: 13px; font-weight: 500; }
.mode-desc { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 1400px) {
  .quadro-kpis, .exec-kpis { grid-template-columns: repeat(3, 1fr); }
  .kanban { /* already flex-row, no change needed */ }
  .kpi-row, .kpi-row:has(> :nth-child(5)), .kpi-row:has(> :nth-child(6)) { grid-template-columns: repeat(3, 1fr); }
  .quadro-grid { grid-template-columns: 1fr; }
  .quadro-team-grid { grid-template-columns: 1fr; }
  .team-strip, .team-strip-wide { grid-template-columns: repeat(3, 1fr); }
  .rel-grid { grid-template-columns: 280px 1fr; }
}
@media (max-width: 1200px) {
  .grid-pie { grid-template-columns: 1fr; }
  .sup-cards { grid-template-columns: 1fr; }
  .prog-grid { grid-template-columns: repeat(2, 1fr); }
  .compras-grid { grid-template-columns: 1fr; }
  .team-status-grid { grid-template-columns: repeat(2, 1fr); }
  .import-grid { grid-template-columns: repeat(2, 1fr); }
  .resp-map { grid-template-columns: 1fr; }
  .leitos-grid { grid-template-columns: repeat(6, 1fr); }
  .estoque-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 1024px) {
  .kpi-row, .kpi-row:has(> :nth-child(5)), .kpi-row:has(> :nth-child(6)) { grid-template-columns: repeat(2, 1fr); }
  .gut-grid { grid-template-columns: repeat(2, 1fr); }
  .grid-2 { grid-template-columns: 1fr; }
  .quadro-kpis, .exec-kpis { grid-template-columns: repeat(2, 1fr); }
  .pie-flex { grid-template-columns: 1fr; }
  .app { grid-template-columns: 64px 1fr; --sb-w: 64px; }
  .sidebar:not(.sidebar-compact) { width: 64px; }
  .sidebar:not(.sidebar-compact) .sb-brand-text,
  .sidebar:not(.sidebar-compact) .sb-item span:not(.sb-icon),
  .sidebar:not(.sidebar-compact) .sb-foot,
  .sidebar:not(.sidebar-compact) .sb-group-label,
  .sidebar:not(.sidebar-compact) .sb-badge,
  .sidebar:not(.sidebar-compact) .sb-ext { display: none; }
  .kanban { min-width: 0; }
  .prog-layout { grid-template-columns: 1fr; }
  .prog-grid { grid-template-columns: 1fr; }
  .leitos-grid { grid-template-columns: repeat(5, 1fr); }
}

// ─── PRNG determinístico (mock estável) ──────────────────────────────
function mulberry32(seed) {
  return function() {
    let t = (seed += 0x6D2B79F5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rand = mulberry32(20260522);

// ─── GUT ──────────────────────────────────────────────────────────────
function makeGUT() {
  const g = 1 + Math.floor(rand() * 5);
  const u = 1 + Math.floor(rand() * 5);
  const t = 1 + Math.floor(rand() * 5);
  const score = g * u * t;
  let level;
  if (score >= 75) level = 'critico';
  else if (score >= 27) level = 'alto';
  else if (score >= 8) level = 'medio';
  else level = 'baixo';
  return { g, u, t, score, level };
}

  ['fechada_area', 12],

  ['recebida', 4],
  ['material_ok', 4],
  ['aguard_mat', 6],

  ['transferida', 3],
  ['externo', 2],
];
function weightedPickStatus() {
  const total = STATUS_WEIGHTS.reduce((s, [, w]) => s + w, 0);
  let r = rand() * total;
  for (const [id, w] of STATUS_WEIGHTS) {
    r -= w;
    if (r <= 0) return id;
  }
  return 'fechada_sup';
}

  for (let i = 0; i < count; i++) {

    let status = weightedPickStatus();
    const gut = makeGUT();

    if (sector.critical && rand() < 0.4) {
      gut.g = Math.min(5, gut.g + 1);
      gut.u = Math.min(5, gut.u + 1);
      gut.score = gut.g * gut.u * gut.t;
      gut.level = gut.score >= 75 ? 'critico' : gut.score >= 27 ? 'alto' : gut.score >= 8 ? 'medio' : 'baixo';
    }
    const dayOffset = Math.floor(rand() * 22);
    const created = new Date(monthBase);
    created.setDate(1 + dayOffset);
    created.setHours(6 + Math.floor(rand() * 14), Math.floor(rand() * 60));

    let startedAt = null, closedArea = null, closedSup = null;
    if (status === 'andamento' || status === 'fechada_area' || status === 'fechada_sup' || status === 'externo') {

    if (status === 'fechada_area' || status === 'fechada_sup') {

    out.push({
      id: `OS-${(184000 + i).toString()}`,

      origin: rand() < 0.18 ? 'cliente' : 'sistema',

  }
  out.sort((a, b) => b.created - a.created);

}

function countBy(arr, getKey) {
  const m = new Map();
  for (const x of arr) {
    const k = getKey(x);
    m.set(k, (m.get(k) || 0) + 1);
  }
  return m;
}
function pct(part, whole) { return whole ? Math.round((part/whole)*100) : 0; }
function fmtDate(d) { return d ? d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' }) : '—'; }
function fmtTime(d) { return d ? d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }) : '—'; }
function fmtDateTime(d) { return d ? `${fmtDate(d)} ${fmtTime(d)}` : '—'; }
function fmtScan(ts) {
  if (!ts) return '';
  try {
    const d = new Date(String(ts).replace(' ', 'T'));
    if (isNaN(d.getTime())) return String(ts);
    return d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  } catch { return String(ts); }
}
function elapsed(d) {
  if (!d) return '';
  const diff = NOW.getTime() - d.getTime();
  const h = Math.floor(diff / 3600000);
  if (h < 1) {
    const m = Math.floor(diff / 60000);
    return `${m}min`;
  }
  if (h < 24) return `${h}h atrás`;
  const days = Math.floor(h / 24);
  if (days < 7) return `${days}d atrás`;
  return fmtDate(d);
}

function KPI({ label, value, sub, accent, spark, onClick }) {

}

function MiniBars({ data, color = 'var(--info)', height = 28 }) {
  const max = Math.max(...data, 1);
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${data.length * 6} ${height}`} preserveAspectRatio="none">
      {data.map((v, i) => {
        const h = Math.max(2, (v / max) * (height - 2));
        return <rect key={i} x={i * 6 + 0.5} y={height - h} width="5" height={h} fill={color} opacity={0.55 + (i / data.length) * 0.45} rx="0.5"/>;
      })}
    </svg>
  );
}

function PieChart({ data, size = 200, thickness = 36, onSliceClick, highlighted }) {
  const total = data.reduce((s, x) => s + x.value, 0);
  if (!total) return (
    <svg width={size} height={size} className="pie">
      <circle cx={size/2} cy={size/2} r={(size-8)/2} fill="var(--border)" opacity={0.4}/>
      <circle cx={size/2} cy={size/2} r={(size-8)/2 - thickness} fill="var(--surface)"/>
      <text x={size/2} y={size/2 - 4} textAnchor="middle" className="pie-total-val">0</text>
      <text x={size/2} y={size/2 + 12} textAnchor="middle" className="pie-total-lbl">total OS</text>
    </svg>
  );
  let acc = 0;
  const cx = size / 2, cy = size / 2;
  const r = (size - 8) / 2;
  const rInner = r - thickness;

  function arc(start, end) {
    const a0 = (start / total) * Math.PI * 2 - Math.PI / 2;
    const a1 = (end / total) * Math.PI * 2 - Math.PI / 2;
    const large = end - start > total / 2 ? 1 : 0;
    const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
    const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
    const xi0 = cx + rInner * Math.cos(a0), yi0 = cy + rInner * Math.sin(a0);
    const xi1 = cx + rInner * Math.cos(a1), yi1 = cy + rInner * Math.sin(a1);
    return `M${x0} ${y0} A${r} ${r} 0 ${large} 1 ${x1} ${y1} L${xi1} ${yi1} A${rInner} ${rInner} 0 ${large} 0 ${xi0} ${yi0} Z`;
  }

  return (
    <svg width={size} height={size} className="pie">
      {data.map((d) => {
        const start = acc;
        const end = acc + d.value;
        acc = end;
        const isHi = highlighted == null || highlighted === d.id;
        return (
          <path key={d.id} d={arc(start, end)} fill={d.color} opacity={isHi ? 1 : 0.25}
                style={{ cursor: onSliceClick ? 'pointer' : 'default', transition: 'opacity .12s' }}
                onClick={() => onSliceClick && onSliceClick(d.id)}>
            <title>{d.label}: {d.value}</title>
          </path>
        );
      })}
      <text x={cx} y={cy - 4} textAnchor="middle" className="pie-total-val">{total}</text>
      <text x={cx} y={cy + 12} textAnchor="middle" className="pie-total-lbl">total OS</text>
    </svg>
  );
}

function HBarList({ rows, onRowClick, highlighted, valueWidth = 40, showPct }) {
  const max = Math.max(...rows.map(r => r.value), 1);
  const total = rows.reduce((s, r) => s + r.value, 0);
  return (
    <div className="hbar-list">
      {rows.map(r => {
        const isHi = highlighted == null || highlighted === r.id;
        return (
          <button key={r.id} className="hbar-row" onClick={() => onRowClick && onRowClick(r.id)}
                  style={{ opacity: isHi ? 1 : 0.45, cursor: onRowClick ? 'pointer' : 'default' }}>
            <span className="hbar-label">{r.label}</span>
            <span className="hbar-track">
              <span className="hbar-fill" style={{ width: `${(r.value / max) * 100}%`, background: r.color }}/>
            </span>
            <span className="hbar-val" style={{ width: valueWidth }}>
              {r.value}
              {showPct && <span className="hbar-pct">{pct(r.value, total)}%</span>}
            </span>
          </button>
        );
      })}
    </div>
  );
}

function Panel({ title, subtitle, action, children, padded = true, className = '' }) {
  return (
    <section className={`panel ${className}`}>
      {(title || action) && (
        <header className="panel-hd">
          <div>
            {title && <h3 className="panel-title">{title}</h3>}

        </header>
      )}
      <div className={padded ? 'panel-body' : 'panel-body panel-body-flush'}>
        {children}
      </div>
    </section>
  );
}

function Chip({ label, count, active, tone, onClick }) {
  const t = tone && TONE[tone];

    <button className={`chip ${active ? 'chip-on' : ''}`}
            onClick={onClick}
            style={t && active ? { color: t.fg, background: t.bg, borderColor: t.fg } : undefined}>
      {t && <span className="pill-dot" style={{ background: t.dot }}></span>}
      <span>{label}</span>
      {count != null && <span className="chip-count">{count}</span>}
    </button>
  );
}

function Avatar({ name, initials, size = 28, status, color }) {
  const ini = initials || (name ? name.split(' ').map(p => p[0]).slice(0, 2).join('').toUpperCase() : '?');

        {ini}
      </div>
      {statusDef && <span className="avatar-status" title={statusDef.label} data-tone={statusDef.tone}/>}
    </div>
  );
}
