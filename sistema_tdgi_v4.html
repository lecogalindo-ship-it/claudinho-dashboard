function QuadroVivo({ data, onOpenOS }) {
  const [fluxo, setFluxo] = pUseState(null);
  const [eventos, setEventos] = pUseState([]);
  const [showExec, setShowExec] = pUseState(false);

  const carregar = () => {
    fetch('/api/fluxo').then(r => r.json()).then(setFluxo).catch(() => {});
    fetch('/api/claudinho/eventos').then(r => r.json())
      .then(d => setEventos(Array.isArray(d) ? d : [])).catch(() => {});
  };
  pUseEffect(() => {
    carregar();
    const t = setInterval(carregar, 20000);
    return () => clearInterval(t);
  }, []);

  const g = (k) => (fluxo && fluxo[k]) || [];
  const fechadas = (data || []).filter(x => x.status === 'fechada_sup').length;

  // Carga real por técnico: conta OS reais atribuídas e ainda abertas
  const cargaTec = {};
  (data || []).forEach(o => {
    if (!o.executor || o.status === 'fechada_sup') return;
    const fn = o.executor.trim().split(' ')[0].toLowerCase();
    if (!fn) return;
    cargaTec[fn] = (cargaTec[fn] || 0) + 1;
  });
  const cargaDe = (nome) => cargaTec[(nome || '').trim().split(' ')[0].toLowerCase()] || 0;
  const ativos = TECHNICIANS.filter(t => cargaDe(t.name) > 0).length;

  function tempoFila(o) {
    const ref = o && (o.atualizado_em || o.criado_em);
    if (!ref) return '';
    try {
      const d = new Date(ref.replace ? ref.replace(' ', 'T') : ref);
      const diff = Date.now() - d.getTime();
      const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000);
      if (h > 48) return Math.floor(h / 24) + 'd';
      if (h > 0) return h + 'h';
      return m + 'min';
    } catch { return ''; }
  }
  const fmtEv = (ts) => {
    if (!ts) return '';
    try { return new Date(ts.replace(' ', 'T')).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }); }
    catch { return ''; }
  };

  const live = g('primeiro_atendimento').slice(0, 6);
  const aguardando = [...g('aguarda_supervisao'), ...g('aguarda_comprador')].slice(0, 6);
  const prontidao = TECHNICIANS.filter(t => cargaDe(t.name) > 0).slice(0, 4);
  const programacao = TECHNICIANS.slice(0, 14);

  return (
    <div className="quadro">
      <div className="quadro-kpis">
        <div className="qk" style={{cursor:'pointer',outline: showExec ? '2px solid var(--accent)' : 'none',borderRadius:8}} onClick={() => setShowExec(v => !v)} title="Clique para ver OS em execução"><div className="qk-v">{g('em_execucao').length}</div><div className="qk-l">Em execução {showExec ? '▲' : '▼'}</div></div>
        <div className="qk"><div className="qk-v ok-text">{fechadas}</div><div className="qk-l">Fechadas (Sup.)</div></div>
        <div className="qk"><div className="qk-v">{g('primeiro_atendimento').length}</div><div className="qk-l">1º atendimento</div></div>
        <div className="qk"><div className="qk-v">{g('aguarda_supervisao').length}</div><div className="qk-l">Aguarda Sup.</div></div>
        <div className="qk"><div className="qk-v">{g('encaminhada_programacao').length}</div><div className="qk-l">P/ programar</div></div>
        <div className="qk"><div className="qk-v warn-text">{g('criticas').length}</div><div className="qk-l">Críticas</div></div>
      </div>

      {showExec && (
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:12,marginBottom:4}}>
          <div style={{fontWeight:600,fontSize:12,marginBottom:8,color:'var(--text-2)'}}>OS EM EXECUÇÃO ({g('em_execucao').length})</div>
          {g('em_execucao').length === 0 && <div className="muted-sm">Nenhuma OS em execução no momento.</div>}
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {g('em_execucao').map(o => (
              <button key={o.num_os} className="live-card" style={{textAlign:'left',background:'var(--surface-2)'}} onClick={() => onOpenOS && onOpenOS(o.num_os)}>
                <div className="live-card-hd">
                  <span className="live-tag" style={{background:'var(--orange-bg)',color:'var(--orange)'}}>▶ EXEC</span>
                  <span className="live-time">⏱ {tempoFila(o)}</span>
                </div>
                <div className="live-desc">{(o.servico || 'Sem descrição').slice(0, 90)}</div>
                <div className="live-sector">{o.setor_critico === 'SIM' && <span className="crit-dot"/>}{o.setor}</div>
                <div className="live-foot"><span className="muted-sm">OS {o.num_os}</span><span className="muted-sm">{(o.colaborador||'—').split(' ')[0]}</span></div>
              </button>
            ))}
          </div>
        </div>
      )}

      <div className="quadro-grid">
        <Panel title="🚨 Atendimento ao vivo" subtitle="OS no primeiro atendimento · plantão/líder" className="qpanel">
          <div className="live-list">
            {live.length === 0 && <div className="muted-sm" style={{padding:12}}>Nenhuma OS no primeiro atendimento.</div>}
            {live.map(o => (
              <button key={o.num_os} className="live-card" onClick={() => onOpenOS && onOpenOS(o.num_os)}>
                <div className="live-card-hd">
                  <span className="live-tag">🆕 NOVA</span>
                  <span className="live-time">⏱ {tempoFila(o)}</span>
                </div>
                <div className="live-desc">{(o.servico || 'Sem descrição').slice(0, 90)}</div>
                <div className="live-sector">
                  {o.setor_critico === 'SIM' && <span className="crit-dot"/>}
                  {o.setor}
                </div>
                <div className="live-foot">
                  <span className="muted-sm">OS {o.num_os}</span>
                  <span className="muted-sm">{(o.colaborador || '—').split(' ')[0]}</span>
                </div>
              </button>
            ))}
          </div>
        </Panel>

        <Panel title="Linha hierárquica" subtitle="Equipe · carga real de OS abertas">
          <div className="hier">
            <HierRow person={GESTOR} role="Gestor" status="ativo"/>
            <HierRow person={PLANEJADOR} role="Planejador" status="ativo" self/>
            <div className="hier-group-label">Supervisores</div>
            {SUPERVISORS.map(s => <HierRow key={s.id} person={s} role="Supervisor" status={s.status}/>)}
            <HierRow person={COMPRADOR} role="Comprador" status="ativo"/>
            <div className="hier-group-label">Técnicos com OS abertas hoje</div>
            {TECHNICIANS.filter(t => cargaDe(t.name) > 0).slice(0, 8).map(t => (
              <div key={t.name} className="hier-row">
                <Avatar name={t.name} status="ativo" size={28}/>
                <div className="hier-name">{t.name.split(' ').slice(0,2).join(' ')}</div>
                <div className="hier-role muted-sm">{(SPECIALTIES.find(x => x.id === t.specialty) || {}).label || t.specialty}</div>
                <span className="hier-status">{cargaDe(t.name)} OS</span>
              </div>
            ))}
            {TECHNICIANS.filter(t => cargaDe(t.name) > 0).length === 0 &&
              <div className="muted-sm" style={{padding:8}}>Nenhuma OS atribuída ainda.</div>}
          </div>
        </Panel>

        <Panel title="⏳ Aguardando ação" subtitle="OS paradas em supervisão / compras">
          <div className="msg-list">
            {aguardando.length === 0 && <div className="muted-sm" style={{padding:12}}>Nada pendente de aprovação.</div>}
            {aguardando.map(o => (
              <button key={o.num_os} className="msg-card" onClick={() => onOpenOS && onOpenOS(o.num_os)}
                style={{textAlign:'left', cursor:'pointer', width:'100%', border:'1px solid var(--border)'}}>
                <div className="msg-hd">
                  <span className="msg-tech">OS {o.num_os}</span>
                  <span className="msg-os">{o.status === 'aguarda_comprador' ? '🛒 Compras' : '👁 Supervisão'}</span>
                  <span className="msg-time">⏱ {tempoFila(o)}</span>
                </div>
                <div className="msg-transcript">
                  {o.setor_critico === 'SIM' && <span className="crit-dot"/>}
                  {o.setor} — {(o.servico || '').slice(0, 70)}
                </div>
              </button>
            ))}
          </div>
        </Panel>
      </div>

      <Panel title="📡 Linha do tempo · ações recentes" subtitle="Eventos reais do monitor (OS escaneadas e classificadas)">
        <div className="timeline-live">
          {eventos.length === 0 && <div className="muted-sm" style={{padding:12}}>Nenhum evento ainda. O monitor registra aqui cada OS que chega.</div>}
          {eventos.slice(0, 12).map((e) => (
            <div key={e.id} className={`tl-live-row tl-live-${e.lido ? 'user' : 'ia'}`}>
              <span className="tl-live-time">{fmtEv(e.criado_em)}</span>
              <span className="tl-live-ic">{e.etapa === 'fechada_sup' ? '✓' : '📋'}</span>
              <span className="tl-live-who">Claudinho</span>
              <span className="tl-live-label">{e.mensagem}</span>
            </div>
          ))}
        </div>
      </Panel>

      <div className="quadro-team-grid">
        <Panel title="🚨 Prontidão · primeiro atendimento" subtitle="Técnicos com OS ativa">
          <div className="team-strip">
            {prontidao.length === 0 && <div className="muted-sm" style={{padding:8}}>Sem técnicos com OS ativa.</div>}
            {prontidao.map(t => <TechCard key={t.name} tech={t} carga={cargaDe(t.name)}/>)}
          </div>
        </Panel>
        <Panel title="🔧 Equipe" subtitle="Carga de OS abertas por técnico">
          <div className="team-strip team-strip-wide">
            {programacao.map(t => <TechCard key={t.name} tech={t} carga={cargaDe(t.name)}/>)}
          </div>
        </Panel>
      </div>
    </div>
  );
}

function HierRow({ person, role, status, self }) {
  const pStatus = PEOPLE_STATUS[status] || PEOPLE_STATUS.ativo;
  return (
    <div className={`hier-row ${self ? 'hier-self' : ''}`}>
      <Avatar name={person.name} initials={person.initials} status={status} size={28}/>
      <div className="hier-name">
        {person.name}
        {self && <span className="hier-self-tag">você</span>}
      </div>
      <div className="hier-role muted-sm">{role}</div>
      <span className="hier-status">
        <span className="hier-emoji">{pStatus.icon}</span>
        {pStatus.label}
      </span>
    </div>
  );
}

function TechCard({ tech, carga }) {
  const temCarga = typeof carga === 'number';
  const ativo = temCarga ? carga > 0 : true;
  return (
    <div className={`tech-card status-${ativo ? 'ativo' : 'folga'}`}>
      <Avatar name={tech.name} status={ativo ? 'ativo' : 'folga'} size={32}/>
      <div className="tech-card-info">
        <div className="tech-card-name">{tech.name.split(' ').slice(0, 2).join(' ')}</div>
        <div className="tech-card-spec">
          <span className="spec-dot" style={{ background: specColor(tech.specialty) }}/>
          {(SPECIALTIES.find(x => x.id === tech.specialty) || {}).label || tech.specialty}
        </div>
      </div>
      <span className="tech-card-status" style={temCarga ? {fontSize:11, fontWeight:700, color: carga > 0 ? 'var(--accent)' : 'var(--muted)'} : null}>
        {temCarga ? (carga > 0 ? carga + ' OS' : '—') : ''}
      </span>
    </div>
  );
}

function FluxoOS({ data, onOpenOS, papel = 'planejador', autoMode = 'manual' }) {
  const { useState: fUseState, useEffect: fUseEffect, useRef: fUseRef } = React;
  const kanbanRef = fUseRef(null);
  const [fluxo, setFluxo] = fUseState(null);
  const [carregando, setCarregando] = fUseState(true);
  const [erro, setErro] = fUseState(null);
  const [avancando, setAvancando] = fUseState(null);
  // Modo automático "falante": o Claudinho narra o raciocínio antes de mover
  const [narracao, setNarracao] = fUseState([]);
  const processandoRef = fUseRef(false);
  const timersRef = fUseRef([]);

  // Etapa em que cada papel pode agir
  const PAPEL_ETAPA = {
    planejador: 'programacao',
    supervisao: 'aguarda_supervisao',
    comprador: 'aguarda_comprador',
    gestao: 'aguarda_gestao',
  };
  const etapaPapel = PAPEL_ETAPA[papel] || 'programacao';
  // Planejador é permissivo: pode agir em qualquer etapa
  const podeAgir = (statusCol) => papel === 'planejador' || statusCol === etapaPapel;

  const FLUXO_ANTERIOR_JS = {
    'primeiro_atendimento': 'os_chegou',
    'aguarda_supervisao': 'primeiro_atendimento',
    'aguarda_comprador': 'aguarda_supervisao',
    'aguardando_material': 'aguarda_comprador',
    'material_chegou': 'aguardando_material',
    'conserto_externo': 'aguarda_supervisao',
    'encaminhada_programacao': 'aguarda_supervisao',
    'programacao': 'encaminhada_programacao',
    'programação': 'encaminhada_programacao',
    'Programado': 'encaminhada_programacao',
    'em_execucao': 'programacao',
    'em_execução': 'programacao',
    'EM ANDAMENTO': 'programacao',
    'fechada_sup': 'em_execucao',
  };

  // Próxima etapa "padrão" do botão Avançar (caminho sem material)
  // encaminhada_programacao NÃO tem Avançar aqui — vai pela aba Programar Dia/Noite
  const PROXIMO_STATUS = {
    // Novos status (IA) — caminho principal
    'em_aberto':                 'em_andamento',
    'recebida':                  'em_andamento',
    'em_andamento':              'fechada_sup',
    'aguardando_material':       'material_chegou',
    'aguardando_compra':         'aguardando_material',
    'material_chegou':           'em_execucao',       // material chegou → equipe executa
    'chamado_externo':           'chamado_externo_realizado',
    'chamado_externo_realizado': 'retorno_chamado_externo',
    'retorno_chamado_externo':   'em_execucao',       // retorno externo → equipe executa
    'aguardando_gestao':         'em_execucao',       // gestão liberou → equipe executa
    'aguardando_planejador':     'em_execucao',
    // Legados (retrocompatibilidade)
    'os_chegou':                 'primeiro_atendimento',
    'primeiro_atendimento':      'aguarda_supervisao',
    'Pendente':                  'aguarda_supervisao',
    'aguarda_supervisao':        'encaminhada_programacao',
    'aguarda_comprador':         'aguardando_material',
    'conserto_externo':          'encaminhada_programacao',
    'programacao':               'em_execucao',
    'programação':               'em_execucao',
    'Programado':                'em_execucao',
    'em_execucao':               'fechada_sup',
    'em_execução':               'fechada_sup',
    'EM ANDAMENTO':              'fechada_sup',
  };

  // Etapas para as quais o card pode ser movido manualmente (menu "Mover para")
  const ETAPAS_MOVER = [
    // Novos (IA)
    { id: 'em_aberto',                  label: 'Em Aberto' },
    { id: 'recebida',                   label: 'Recebida' },
    { id: 'em_andamento',               label: 'Em Andamento' },
    { id: 'aguardando_material',        label: 'Aguardando Material' },
    { id: 'aguardando_compra',          label: 'Aguardando Compra' },
    { id: 'material_chegou',            label: 'Material Chegou' },
    { id: 'chamado_externo',            label: 'Chamado Externo' },
    { id: 'chamado_externo_realizado',  label: 'Chamado Realizado' },
    { id: 'retorno_chamado_externo',    label: 'Aguard. Retorno Externo' },
    { id: 'aguardando_gestao',          label: 'Aguardando Gestão' },
    { id: 'fechada_sup',                label: 'Fechada Supervisão' },
    { id: 'fechada_area',               label: 'Fechada pela Área' },
    // Legados
    { id: 'primeiro_atendimento',       label: 'Primeiro Atendimento (legado)' },
    { id: 'aguarda_supervisao',         label: 'Aguarda Supervisão (legado)' },
    { id: 'conserto_externo',           label: 'Conserto Externo (legado)' },
    { id: 'encaminhada_programacao',    label: 'Enc. Programação (legado)' },
    { id: 'em_execucao',                label: 'Em Execução (legado)' },
  ];

  function tempoAguardando(o) {
    const ref = (o && (o.atualizado_em || o.criado_em)) || null;
    if (!ref) return '';
    try {
      const d = new Date(ref.replace ? ref.replace(' ', 'T') : ref);
      const diff = Date.now() - d.getTime();
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      if (h > 48) return Math.floor(h/24) + 'd';
      if (h > 0) return h + 'h' + (m > 0 ? ' ' + m + 'min' : '');
      return m + 'min';
    } catch { return ''; }
  }

  // Cor do marcador de tempo: verde recente, laranja, vermelho parado
  function corTempo(o) {
    const ref = (o && (o.atualizado_em || o.criado_em)) || null;
    if (!ref) return 'var(--muted)';
    try {
      const d = new Date(ref.replace ? ref.replace(' ', 'T') : ref);
      const h = (Date.now() - d.getTime()) / 3600000;
      if (h > 24) return '#e74c3c';
      if (h > 8) return '#e67e22';
      return '#27ae60';
    } catch { return 'var(--muted)'; }
  }

  async function carregarFluxo() {
    setCarregando(true);
    setErro(null);
    try {
      const r = await fetch('/api/fluxo');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      setFluxo(d);
    } catch (e) {
      setErro('Erro ao carregar fluxo: ' + e.message);
    } finally {
      setCarregando(false);
    }
  }

  fUseEffect(() => { carregarFluxo(); }, []);

  // Nome amigável da trilha de destino, para a narração
  const NOME_DESTINO = {
    encaminhada_programacao: 'Planejador (programação)',
    aguarda_comprador: 'Comprador',
    conserto_externo: 'Planejador (conserto externo)',
    aguarda_supervisao: 'Supervisão',
  };

  // O Claudinho "pensa como humano": olha a O.S e decide o destino + o motivo.
  function decidirDestino(o) {
    if (o.setor_critico === 'SIM') return null; // crítica não é roteada sozinha
    const txt = ((o.servico || '') + ' ' + (o.obs || '')).toLowerCase();
    const pedeExterno  = /(extern|fornecedor|garantia|assist|fabricante|oficina)/.test(txt);
    const pedeMaterial = /(troc|peç|peca|material|comprar|compra|adquir|substitu|repor|reposi|filtro|lâmpada|lampada|motor|bomba)/.test(txt);
    if (pedeExterno)
      return { destino: 'conserto_externo',
               motivo: 'menciona garantia/serviço externo, então encaminho para conserto externo via Planejador.' };
    if (pedeMaterial)
      return { destino: 'aguarda_comprador',
               motivo: 'o serviço indica troca de peça/material, então mando para o Comprador avaliar a compra antes de programar.' };
    return { destino: 'encaminhada_programacao',
             motivo: 'é serviço de rotina, sem indício de material nem urgência crítica — sigo direto para a Programação.' };
  }

  function fala(texto, tipo) {
    setNarracao(prev => [...prev.slice(-40),
      { id: Date.now() + Math.random(), hora: new Date().toLocaleTimeString('pt-BR'), texto, tipo }]);
  }
  const agenda = (fn, ms) => { const t = setTimeout(fn, ms); timersRef.current.push(t); return t; };

  // Limpa timers ao desmontar / sair do modo auto
  fUseEffect(() => () => { timersRef.current.forEach(clearTimeout); timersRef.current = []; }, []);

  // MODO AUTO FALANTE — processa UMA O.S por vez, narrando o raciocínio.
  fUseEffect(() => {
    if (autoMode !== 'auto' || !fluxo) { processandoRef.current = false; return; }
    if (processandoRef.current) return;

    // Fila de candidatas: primeiro o 1º atendimento, depois a supervisão
    const fila = [...(fluxo.primeiro_atendimento || []), ...(fluxo.aguarda_supervisao || [])];
    const criticas = fila.filter(o => o.setor_critico === 'SIM');
    const alvo = fila.find(o => o.setor_critico !== 'SIM' && decidirDestino(o));
    if (!alvo) {
      if (criticas.length)
        fala(`Tem ${criticas.length} O.S crítica(s) na fila — essas eu deixo para um humano decidir, não roteio sozinho.`, 'aviso');
      return;
    }

    const plano = decidirDestino(alvo);
    processandoRef.current = true;
    fala(`🤔 Olhando a OS ${alvo.num_os} — setor "${alvo.setor || '—'}": ${(alvo.servico || 'sem descrição').slice(0, 70)}`, 'pensa');
    agenda(() => {
      fala(`💡 Decisão: ${plano.motivo}`, 'decide');
      agenda(() => {
        fetch('/api/os/avancar', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ num_os: alvo.num_os, nova_etapa: plano.destino,
                                 atualizado_por: 'claudinho', responsavel: 'claudinho' })
        }).then(() => {
          fala(`✅ Movi a OS ${alvo.num_os} para ${NOME_DESTINO[plano.destino] || plano.destino}.`, 'ok');
          agenda(() => { processandoRef.current = false; carregarFluxo(); }, 800);
        }).catch(() => {
          fala(`⚠️ Não consegui mover a OS ${alvo.num_os} agora, vou tentar de novo.`, 'aviso');
          agenda(() => { processandoRef.current = false; carregarFluxo(); }, 1500);
        });
      }, 1400);
    }, 1300);
  }, [fluxo, autoMode]);

  async function avancar(num_os, status_atual) {
    const proxima = PROXIMO_STATUS[status_atual];
    if (!proxima) return;
    setAvancando(num_os);
    const mainScroll = document.querySelector('.main-scroll');
    const savedTop = mainScroll ? mainScroll.scrollTop : 0;
    const savedLeft = kanbanRef.current ? kanbanRef.current.scrollLeft : 0;
    try {
      const r = await fetch('/api/os/avancar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ num_os, nova_etapa: proxima })
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      await carregarFluxo();
      if (mainScroll) mainScroll.scrollTop = savedTop;
      if (kanbanRef.current) kanbanRef.current.scrollLeft = savedLeft;
    } catch (e) {
      alert('Erro ao avançar OS: ' + e.message);
    } finally {
      setAvancando(null);
    }
  }

  async function postAcao(url, body, erroMsg) {
    setAvancando(body.num_os);
    const mainScroll = document.querySelector('.main-scroll');
    const savedTop = mainScroll ? mainScroll.scrollTop : 0;
    const savedLeft = kanbanRef.current ? kanbanRef.current.scrollLeft : 0;
    try {
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.erro || ('HTTP ' + r.status));
      await carregarFluxo();
      if (mainScroll) mainScroll.scrollTop = savedTop;
      if (kanbanRef.current) kanbanRef.current.scrollLeft = savedLeft;
    } catch (e) {
      alert(erroMsg + ': ' + e.message);
    } finally {
      setAvancando(null);
    }
  }

  function devolver(num_os) {
    const motivo = window.prompt('Motivo da devolução (obrigatório):');
    if (!motivo || !motivo.trim()) return;
    postAcao('/api/os/devolver', { num_os, motivo: motivo.trim(), responsavel: papel }, 'Erro ao devolver OS');
  }

  function escalar(num_os) {
    const motivo = window.prompt('Motivo do escalonamento para gestão (obrigatório):');
    if (!motivo || !motivo.trim()) return;
    postAcao('/api/os/escalar', { num_os, motivo: motivo.trim(), responsavel: papel }, 'Erro ao escalar OS');
  }

  function liberar(num_os) {
    const obs = window.prompt('Observação da liberação (opcional):') || '';
    postAcao('/api/os/retornar_gestao', { num_os, responsavel: papel, obs }, 'Erro ao liberar OS');
  }

  function mover(num_os, nova_etapa) {
    if (!nova_etapa) return;
    postAcao('/api/os/avancar', { num_os, nova_etapa, atualizado_por: papel, responsavel: papel }, 'Erro ao mover OS');
  }

  // ── 6 CAMINHOS (trilhas) da O.S ──────────────────────────────────────
  // Cada trilha é um DONO do processo. O status específico da O.S vira uma
  // ETIQUETA dentro do card (ex.: na trilha do Comprador, "aguardando
  // material"; na do Planejador, "aguardando chamado externo").
  // 'fontes' = quais status do backend caem nesta trilha.
  const TRILHAS = [
    { id: 'os_chegou',            title: '📥 O.S Chegou',         hint: 'recém escaneada · aguarda triagem',
      fontes: ['os_chegou', 'sem_classificar'] },
    { id: 'primeiro_atendimento', title: '🛠 Primeiro Atendimento', hint: 'plantão · primeiro toque',
      fontes: ['primeiro_atendimento'] },
    { id: 'supervisao',           title: '👷 Supervisão',         hint: 'decide o destino · comprar, separar, externo',
      fontes: ['aguarda_supervisao'] },
    { id: 'comprador',            title: '🛒 Comprador',          hint: 'compras · material',
      fontes: ['aguarda_comprador', 'aguardando_material', 'material_chegou'] },
    { id: 'planejador',           title: '📋 Planejador',         hint: 'programação · externo · gestão',
      fontes: ['encaminhada_programacao', 'conserto_externo', 'aguarda_gestao'] },
    { id: 'equipe',               title: '🗓 Equipe (Programação)', hint: 'programada · em execução',
      fontes: ['programacao', 'em_execucao'] },
    { id: 'concluida',            title: '✅ Concluída',          hint: 'supervisão fechou',
      fontes: ['concluida'] },
  ];

  // Etiqueta amigável do status específico, mostrada dentro do card
  const STATUS_LABEL = {
    os_chegou: 'recém-chegada', primeiro_atendimento: '1º atendimento',
    Pendente: '1º atendimento', aberto: '1º atendimento',
    aguarda_supervisao: 'aguardando supervisão',
    aguarda_comprador: 'aguardando pedido de compra',
    aguardando_material: 'aguardando material', material_chegou: 'material chegou',
    encaminhada_programacao: 'aguardando programação',
    conserto_externo: 'aguardando chamado externo', aguarda_gestao: 'aguardando gestão',
    programacao: 'programada', 'programação': 'programada', Programado: 'programada',
    em_execucao: 'em execução', 'em_execução': 'em execução', 'EM ANDAMENTO': 'em execução',
    fechada_area: 'concluída (téc. + área)', fechada_sup: 'fechada pela supervisão',
    CONCLUIDA: 'concluída', 'CONCLUÍDA': 'concluída',
  };
  // Status que estão "fora da fila ativa" (aguardam fator externo)
  const STATUS_EXTERNO = ['aguardando_material', 'conserto_externo'];
  const rotuloStatus = (s) => STATUS_LABEL[s] || s || '';

  // Monta o texto do tooltip (aparece ao passar o mouse no card)
  const tooltipOS = (o) => {
    const linhas = [
      `OS ${o.num_os}`,
      o.setor ? `Setor: ${o.setor}` : '',
      o.servico ? `Solicitado: ${o.servico}` : '',
      o.colaborador ? `Técnico: ${o.colaborador}` : '',
      o.status ? `Status: ${rotuloStatus(o.status)}` : '',
      o.criado_em ? `Escaneada em: ${fmtScan(o.criado_em)}` : '',
      o.setor_critico === 'SIM' ? '⚠ SETOR CRÍTICO' : '',
    ];
    return linhas.filter(Boolean).join('\n');
  };

  if (carregando) return <div className="fluxo"><div className="muted-sm" style={{padding:32}}>Carregando fluxo real do banco...</div></div>;
  if (erro) return <div className="fluxo"><div style={{padding:32,color:'var(--danger)'}}>{erro} <button className="btn-ghost-sm" onClick={carregarFluxo}>Tentar novamente</button></div></div>;

  return (
    <div className="fluxo">
      <div className="fluxo-controls">
        <div className="muted-sm">
          {autoMode === 'auto' && <span style={{color:'#27ae60',fontWeight:600}}>🤖 Modo Auto · o Claudinho explica e roteia cada O.S não-crítica (críticas ficam para humano)</span>}
          {autoMode === 'hibrido' && <span style={{color:'var(--accent)',fontWeight:600}}>⚙ Modo Híbrido · a IA sugere (botão azul pulsando) e você confirma</span>}
          {autoMode === 'manual' && <span>👤 Modo Manual · clique no card para abrir, use Avançar/Mover para encaminhar</span>}
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn-ghost-sm" onClick={carregarFluxo}>↻ Atualizar</button>
          {fluxo && fluxo.criticas && fluxo.criticas.length > 0 &&
            <span className="pill" style={{color:'var(--danger)',background:'var(--danger-bg)'}}>
              🚨 {fluxo.criticas.length} crítica(s)
            </span>
          }
        </div>
      </div>

      {/* CONVERSA DO CLAUDINHO — só no modo automático */}
      {autoMode === 'auto' && (
        <div style={{margin:'0 0 12px', border:'1px solid var(--border)', borderRadius:10,
                     background:'var(--surface)', overflow:'hidden'}}>
          <div style={{padding:'8px 12px', background:'var(--surface-2)', borderBottom:'1px solid var(--border)',
                       fontSize:12, fontWeight:700, display:'flex', alignItems:'center', gap:8}}>
            <span>🤖 Claudinho trabalhando</span>
            <span className="muted-sm" style={{fontWeight:400}}>· pensando em voz alta e roteando as O.S</span>
            {narracao.length > 0 &&
              <button className="btn-ghost-sm" style={{marginLeft:'auto', fontSize:11, padding:'1px 8px'}}
                onClick={() => setNarracao([])}>Limpar</button>}
          </div>
          <div style={{maxHeight:170, overflowY:'auto', padding:'8px 12px', display:'flex', flexDirection:'column', gap:5}}>
            {narracao.length === 0
              ? <div className="muted-sm" style={{fontSize:12, fontStyle:'italic'}}>Aguardando O.S na fila para analisar…</div>
              : narracao.map(m => (
                  <div key={m.id} style={{fontSize:12, lineHeight:1.4,
                       color: m.tipo === 'ok' ? '#27ae60'
                            : m.tipo === 'decide' ? 'var(--accent)'
                            : m.tipo === 'aviso' ? '#e67e22' : 'var(--text)'}}>
                    <span className="muted-sm" style={{fontSize:10, marginRight:6}}>{m.hora}</span>{m.texto}
                  </div>
                ))}
          </div>
        </div>
      )}

      <div className="kanban" ref={kanbanRef}>
        {TRILHAS.map(col => {
          // Junta todos os status (fontes) que pertencem a esta trilha
          const items = (col.fontes || []).reduce(
            (acc, k) => acc.concat((fluxo && fluxo[k]) || []), []);
          return (
            <div key={col.id} className="kb-col">
              <header className="kb-col-hd">
                <div>
                  <div className="kb-col-title">{col.title}</div>
                  <div className="kb-col-hint">{col.hint}</div>
                </div>
                <div className="kb-col-count" style={items.length > 0 ? {background:'var(--accent)',color:'#fff'} : {}}>{items.length}</div>
              </header>
              <div className="kb-list">
                {items.length === 0 && <div className="muted-sm" style={{padding:'12px 8px',fontSize:12}}>Nenhuma OS nesta trilha</div>}
                {items.map(o => {
                  const critico = o.setor_critico === 'SIM';
                  const critClass = o.criticidade === 'critico' ? 'kb-card-critico' : o.criticidade === 'alto' ? 'kb-card-alto' : o.criticidade === 'baixo' ? 'kb-card-baixo' : 'kb-card-medio';
                  const proxima = PROXIMO_STATUS[o.status];
                  const aguardando = tempoAguardando(o);
                  const ehGestao = o.status === 'aguarda_gestao';
                  const ehExterno = STATUS_EXTERNO.includes(o.status);
                  const ehConcluida = col.id === 'concluida';
                  const acaoLiberada = !ehConcluida && (ehGestao ? (papel === 'gestao') : podeAgir(col.id)) && !ehExterno;
                  // No modo híbrido a IA "pisca" o botão Avançar sugerindo a ação
                  const glow = autoMode === 'hibrido' && acaoLiberada && proxima && !ehGestao;
                  return (
                    <div key={o.num_os}
                      className={`kb-card ${critClass}`}
                      style={{cursor:'pointer', ...(acaoLiberada ? {} : {opacity:0.6})}}
                      onClick={() => onOpenOS && onOpenOS(o.num_os)}
                      title={tooltipOS(o)}>
                      <div className="kb-card-hd">
                        <span style={{fontFamily:'var(--ff-mono)',fontSize:15,fontWeight:700,color:'var(--text)'}}>
                          {o.num_os}
                        </span>
                        {critico && <span className="kb-card-flag">⚠ crítico</span>}
                        {aguardando && <span style={{fontSize:11,fontWeight:600,color:corTempo(o),marginLeft:'auto'}}>⏱ {aguardando}</span>}
                      </div>
                      {/* Data e hora em que a OS foi escaneada */}
                      {o.criado_em && (
                        <div style={{fontSize:10.5,color:'var(--muted)',marginTop:3,display:'flex',alignItems:'center',gap:4}}>
                          <span>🕓</span><span>{fmtScan(o.criado_em)}</span>
                        </div>
                      )}
                      {/* Botões de ação — não disparam o clique de abrir a OS */}
                      <div style={{marginTop:6,display:'flex',gap:4,flexWrap:'wrap',justifyContent:'flex-end'}}
                        onClick={(e) => e.stopPropagation()}>
                        {ehGestao && papel === 'gestao' && (
                          <button
                            className="btn-primary-sm"
                            style={{fontSize:11,padding:'2px 8px'}}
                            disabled={avancando === o.num_os}
                            onClick={() => liberar(o.num_os)}
                          >✓ Liberar</button>
                        )}
                        {!ehGestao && proxima && acaoLiberada && o.status !== 'encaminhada_programacao' && (
                          <button
                            className={`btn-primary-sm${glow ? ' btn-glow' : ''}`}
                            style={{fontSize:11,padding:'2px 8px'}}
                            disabled={avancando === o.num_os}
                            onClick={() => avancar(o.num_os, o.status)}
                          >
                            {avancando === o.num_os ? '...' : 'Avançar →'}
                          </button>
                        )}
                        {o.status === 'encaminhada_programacao' && acaoLiberada && (
                          <span style={{fontSize:10,color:'var(--muted)',fontStyle:'italic'}}>📋 via Programar</span>
                        )}
                        {!ehGestao && acaoLiberada && (
                          <select
                            value=""
                            disabled={avancando === o.num_os}
                            onChange={(e) => mover(o.num_os, e.target.value)}
                            title="Mover para outra fila"
                            style={{fontSize:11,padding:'2px 4px',borderRadius:6,border:'1px solid var(--border)',background:'var(--surface)',cursor:'pointer'}}>
                            <option value="">Mover ▾</option>
                            {ETAPAS_MOVER.filter(et => et.id !== o.status).map(et => (
                              <option key={et.id} value={et.id}>{et.label}</option>
                            ))}
                          </select>
                        )}
                        {!ehGestao && acaoLiberada && FLUXO_ANTERIOR_JS[o.status] && (
                          <button
                            className="btn-ghost-sm"
                            style={{fontSize:11,padding:'2px 8px'}}
                            disabled={avancando === o.num_os}
                            onClick={() => devolver(o.num_os)}
                          >↩ Devolver</button>
                        )}
                        {!ehGestao && !ehConcluida && (
                          <button
                            className="btn-ghost-sm"
                            style={{fontSize:11,padding:'2px 8px'}}
                            disabled={avancando === o.num_os}
                            onClick={() => escalar(o.num_os)}
                          >⏫ Escalar</button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SugestoesIA({ autoMode }) {
  const [sugestoes, setSugestoes] = pUseState([]);
  const [resumo, setResumo] = pUseState('');
  const [carregando, setCarregando] = pUseState(false);
  const [analisando, setAnalisando] = pUseState(false);

  const carregarSugestoes = () => {
    fetch('/api/claudinho/sugestoes')
      .then(r => r.json())
      .then(d => {
        setSugestoes(d.sugestoes || []);
      })
      .catch(() => {});
  };

  pUseEffect(() => {
    carregarSugestoes();
    const t = setInterval(carregarSugestoes, 60000);
    return () => clearInterval(t);
  }, []);

  const analisarAgora = () => {
    setAnalisando(true);
    fetch('/api/claudinho/analisar', { method: 'POST' })
      .then(r => r.json())
      .then(d => {
        setResumo(d.resumo || '');
        carregarSugestoes();
      })
      .catch(() => {})
      .finally(() => setAnalisando(false));
  };

  const executar = (sugestao_id, acao) => {
    setSugestoes(prev => prev.filter(s => s.sugestao_id !== sugestao_id));
    fetch('/api/claudinho/executar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sugestao_id, acao })
    }).catch(() => { carregarSugestoes(); });
  };

  const corBadge = (prioridade) => {
    if (prioridade === 'critica') return { background: '#c0392b', color: '#fff' };
    if (prioridade === 'alta')    return { background: '#e67e22', color: '#fff' };
    return { background: '#2980b9', color: '#fff' };
  };

  return (
    <div className="sugestoes">
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
        <button
          className="btn-primary-sm"
          onClick={analisarAgora}
          disabled={analisando}
          style={{ display: 'flex', alignItems: 'center', gap: 6 }}
        >
          {analisando ? '⏳ Analisando...' : '🤖 Analisar agora'}
        </button>
        {resumo && <span className="muted-sm" style={{ fontStyle: 'italic' }}>{resumo}</span>}
      </div>

      {sugestoes.length === 0 ? (
        <div style={{ padding: '32px 0', textAlign: 'center', color: 'var(--text-2, #666)' }}>
          ✓ Nenhuma sugestão pendente — operação em dia.
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {sugestoes.map(s => (
            <div key={s.sugestao_id || s.id} style={{
              border: '1px solid var(--border, #ddd)',
              borderRadius: 8,
              padding: '14px 16px',
              background: 'var(--surface, #fff)'
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
                <span style={{
                  ...corBadge(s.prioridade),
                  fontSize: 10, fontWeight: 700, letterSpacing: '0.1em',
                  textTransform: 'uppercase', padding: '2px 8px', borderRadius: 4
                }}>{s.prioridade}</span>
                <span style={{ fontSize: 11, color: 'var(--text-2, #888)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>{s.tipo}</span>
              </div>
              <div style={{ fontWeight: 600, marginBottom: 4 }}>{s.titulo}</div>
              <div style={{ fontSize: 14, color: 'var(--text-2, #555)', marginBottom: 12 }}>{s.descricao}</div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button
                  className="btn-primary-sm"
                  onClick={() => executar(s.sugestao_id || s.id, 'aprovar')}
                >✅ Aprovar</button>
                <button
                  className="btn-ghost-sm"
                  onClick={() => executar(s.sugestao_id || s.id, 'rejeitar')}
                >❌ Rejeitar</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AlertasOS() {
  const [eventos, setEventos] = pUseState([]);
  const [naoLidos, setNaoLidos] = pUseState(0);

  const carregar = () => {
    fetch('/api/claudinho/eventos')
      .then(r => r.json())
      .then(d => {
        const lista = Array.isArray(d) ? d : [];
        setEventos(lista);
        setNaoLidos(lista.filter(e => !e.lido).length);
      })
      .catch(() => {});
  };

  pUseEffect(() => {
    carregar();
    const t = setInterval(carregar, 15000);
    return () => clearInterval(t);
  }, []);

  const marcarLidos = () => {
    fetch('/api/claudinho/eventos/lidos', { method: 'POST' })
      .then(() => carregar())
      .catch(() => {});
  };

  const corEtapa = (etapa) => {
    if (etapa === 'primeiro_atendimento') return '#3498db';
    if (etapa === 'em_execucao') return '#e67e22';
    if (etapa === 'aguarda_supervisao') return '#8e44ad';
    if (etapa === 'fechada_sup') return '#27ae60';
    return '#7f8c8d';
  };

  const labelEtapa = (etapa) => {
    const m = {
      primeiro_atendimento: 'Recebida',
      em_execucao: 'Em campo',
      aguarda_supervisao: 'Aguarda Sup.',
      aguarda_comprador: 'Aguarda Compras',
      fechada_sup: 'Pronta p/ fechar',
      programacao: 'Programação',
    };
    return m[etapa] || etapa;
  };

  const fmt = (ts) => {
    if (!ts) return '';
    try {
      const d = new Date(ts.replace(' ', 'T'));
      return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    } catch(e) { return ts; }
  };

  return (
    <div style={{ maxWidth: 680 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
        <span style={{ fontWeight: 700, fontSize: 15 }}>
          Alertas do Monitor
          {naoLidos > 0 && (
            <span style={{
              marginLeft: 8, background: '#e74c3c', color: '#fff',
              borderRadius: 10, fontSize: 11, padding: '2px 7px', fontWeight: 700
            }}>{naoLidos} novo{naoLidos > 1 ? 's' : ''}</span>
          )}
        </span>
        {naoLidos > 0 && (
          <button className="btn-ghost-sm" style={{ fontSize: 11 }} onClick={marcarLidos}>
            Marcar como lidos
          </button>
        )}
        <button className="btn-ghost-sm" style={{ fontSize: 11, marginLeft: 'auto' }} onClick={carregar}>
          ↻ Atualizar
        </button>
      </div>
      {eventos.length === 0 ? (
        <div style={{ padding: '32px 0', textAlign: 'center', color: 'var(--text-2,#666)' }}>
          Nenhuma OS recebida ainda. O monitor avisará aqui quando chegar uma nova OS.
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {eventos.map(e => (
            <div key={e.id} style={{
              display: 'flex', alignItems: 'flex-start', gap: 12,
              padding: '12px 14px', borderRadius: 8,
              background: e.lido ? 'var(--surface,#fff)' : 'var(--accent-soft,#edf6ff)',
              border: `1px solid ${e.lido ? 'var(--border,#ddd)' : '#b3d7f8'}`,
            }}>
              <span style={{
                background: corEtapa(e.etapa), color: '#fff',
                borderRadius: 4, fontSize: 10, fontWeight: 700,
                padding: '3px 8px', whiteSpace: 'nowrap', marginTop: 2
              }}>{labelEtapa(e.etapa)}</span>
              <div style={{ flex: 1 }}>
                <span style={{ fontWeight: 600, fontSize: 14 }}>OS {e.num_os}</span>
                <span style={{ color: 'var(--text-2,#555)', fontSize: 13, marginLeft: 8 }}>{e.mensagem.replace(/OS \S+/, '').replace(/\(.*?\)/, '').trim()}</span>
              </div>
              <span style={{ fontSize: 11, color: 'var(--muted,#888)', whiteSpace: 'nowrap' }}>{fmt(e.criado_em)}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ProgramarDianoite({ data, onOpenOS, autoMode = 'manual' }) {
  const [fluxo, setFluxo] = pUseState(null);
  const [atribuicoes, setAtribuicoes] = pUseState({});
  const [selecionada, setSelecionada] = pUseState(null);
  const [turno, setTurno] = pUseState('dia');
  const [salvando, setSalvando] = pUseState(null);
  const [sugestoes, setSugestoes] = pUseState({});

  const carregar = () => fetch('/api/fluxo').then(r => r.json()).then(setFluxo).catch(() => {});
  pUseEffect(() => { carregar(); const t = setInterval(carregar, 30000); return () => clearInterval(t); }, []);

  const g = (k) => (fluxo && fluxo[k]) || [];
  const prontas = [...g('encaminhada_programacao'), ...g('material_chegou')];
  const programadas = g('programacao');

  const cargaTec = {};
  programadas.forEach(o => {
    if (o.colaborador) { const n = o.colaborador.trim().split(' ')[0].toLowerCase(); cargaTec[n] = (cargaTec[n] || 0) + 1; }
  });

  const gerarSugestoes = (pool) => {
    const sug = {};
    const tecCarga = { ...cargaTec };
    prontas.forEach(o => {
      const esp = o.especialidade || 'geral';
      const tecEsp = pool.filter(t => t.specialty === esp);
      const candidates = tecEsp.length > 0 ? tecEsp : pool;
      const sorted = [...candidates].sort((a, b) => (tecCarga[a.name.split(' ')[0].toLowerCase()] || 0) - (tecCarga[b.name.split(' ')[0].toLowerCase()] || 0));
      const menor = sorted[0];
      if (menor) { sug[o.num_os] = menor.name; const k = menor.name.split(' ')[0].toLowerCase(); tecCarga[k] = (tecCarga[k] || 0) + 1; }
    });
    return sug;
  };

  pUseEffect(() => {
    if (!fluxo) return;
    if (autoMode === 'auto') setAtribuicoes(gerarSugestoes(TECHNICIANS));
    else if (autoMode === 'hibrido') setSugestoes(gerarSugestoes(TECHNICIANS));
    else { setAtribuicoes({}); setSugestoes({}); }
  }, [autoMode, fluxo]);

  async function atribuir(num_os, tecnico) {
    const mainScroll = document.querySelector('.main-scroll');
    const savedTop = mainScroll ? mainScroll.scrollTop : 0;
    setSalvando(num_os);
    try {
      const r = await fetch('/api/programacao/atribuir', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ num_os, tecnico, turno })
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      setAtribuicoes(prev => { const n = {...prev}; delete n[num_os]; return n; });
      setSugestoes(prev => { const n = {...prev}; delete n[num_os]; return n; });
      setSelecionada(null);
      await carregar();
      if (mainScroll) mainScroll.scrollTop = savedTop;
    } catch(e) { alert('Erro ao atribuir: ' + e.message); }
    finally { setSalvando(null); }
  }

  async function confirmarTodos() {
    for (const [num_os, tecnico] of Object.entries(atribuicoes)) await atribuir(num_os, tecnico);
  }

  const porTecnico = {};
  programadas.forEach(o => { const tec = o.colaborador || '—'; (porTecnico[tec] = porTecnico[tec] || []).push(o); });

  return (
    <div className="programar">
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14,flexWrap:'wrap'}}>
        <div className="plan-tabs">
          <button className={turno==='dia'?'plan-tab-on':''} onClick={() => setTurno('dia')}>☀ Dia</button>
          <button className={turno==='noite'?'plan-tab-on':''} onClick={() => setTurno('noite')}>🌙 Noite</button>
        </div>
        <div style={{display:'flex',gap:6,marginLeft:'auto',alignItems:'center'}}>
          {autoMode !== 'manual' && Object.keys(atribuicoes).length > 0 && (
            <button className="btn-primary-sm" onClick={confirmarTodos}>
              ✓ Confirmar {Object.keys(atribuicoes).length} atribuição{Object.keys(atribuicoes).length !== 1 ? 'ões' : ''}
            </button>
          )}
          <button className="btn-ghost-sm" onClick={carregar}>↻ Atualizar</button>
          <button className="btn-ghost-sm" onClick={() => window.print()}>🖨 Imprimir</button>
        </div>
      </div>

      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        <div className="qk" style={{minWidth:110}}><div className="qk-v">{prontas.length}</div><div className="qk-l">Para atribuir</div></div>
        <div className="qk" style={{minWidth:110}}><div className="qk-v ok-text">{programadas.length}</div><div className="qk-l">Programadas</div></div>
        <div className="qk" style={{minWidth:110}}><div className="qk-v warn-text">{prontas.filter(o => o.setor_critico === 'SIM').length}</div><div className="qk-l">Críticas</div></div>
        <div className="qk" style={{minWidth:110}}><div className="qk-v">{Object.keys(porTecnico).length}</div><div className="qk-l">Técnicos alocados</div></div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        <Panel title={`OS para programar (${prontas.length})`}
               subtitle={selecionada ? `OS ${selecionada} selecionada · clique em um técnico →` : 'Clique em uma OS para selecioná-la'}>
          {prontas.length === 0 && (
            <div className="muted-sm" style={{padding:'24px 8px',textAlign:'center'}}>
              Nenhuma OS encaminhada ainda. Use o Fluxo de OS → coluna Encaminhada p/ Programação.
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {prontas.map(o => {
              const jaAtrib = atribuicoes[o.num_os];
              const sug = sugestoes[o.num_os];
              const sel = selecionada === o.num_os;
              return (
                <div key={o.num_os}
                  onClick={() => !jaAtrib && setSelecionada(sel ? null : o.num_os)}
                  style={{padding:'10px 12px',borderRadius:8,cursor:jaAtrib?'default':'pointer',
                    border:`1px solid ${sel?'var(--accent)':jaAtrib?'var(--ok)':'var(--border)'}`,
                    background:sel?'var(--accent-bg)':jaAtrib?'var(--ok-bg)':'var(--surface-2)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:6}}>
                    <span style={{fontFamily:'var(--ff-mono)',fontWeight:600,fontSize:12}}>OS {o.num_os}</span>
                    {o.setor_critico === 'SIM' && <span className="kb-card-flag">⚠ crítico</span>}
                    {jaAtrib && <span style={{fontSize:11,color:'var(--ok)',fontWeight:600}}>✓ {jaAtrib.split(' ')[0]}</span>}
                    {!jaAtrib && sug && autoMode === 'hibrido' && <span style={{fontSize:11,color:'var(--accent)',fontWeight:600}}>💡 {sug.split(' ')[0]}</span>}
                  </div>
                  <div style={{fontSize:12,color:'var(--text-2)',marginTop:3}}>{(o.servico||'').slice(0,70)}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{o.setor} · {o.especialidade||'geral'}</div>
                  {sel && <div style={{marginTop:6,fontSize:11,color:'var(--accent)',fontWeight:600}}>→ Clique em um técnico ao lado para atribuir</div>}
                  {!jaAtrib && sug && autoMode === 'hibrido' && (
                    <div style={{marginTop:6}}>
                      <button className="btn-primary-sm" style={{fontSize:11,padding:'2px 8px'}}
                        disabled={salvando === o.num_os}
                        onClick={(e) => { e.stopPropagation(); atribuir(o.num_os, sug); }}>
                        ✓ Aceitar: {sug.split(' ')[0]}
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </Panel>

        <Panel title="Técnicos disponíveis"
               subtitle={selecionada ? 'Clique para atribuir a OS selecionada' : 'Selecione uma OS primeiro'}>

function RevisaoAssinaturas() {
  const [pendentes, setPendentes] = pUseState([]);
  const [banco, setBanco] = pUseState({tecnicos:{}, total:0});
  const [carregando, setCarregando] = pUseState(true);
  const [processando, setProcessando] = pUseState('');

  const carregar = () => {
    setCarregando(true);
    Promise.all([
      fetch('/api/assinaturas/pendentes').then(r => r.json()).catch(() => ({pendentes:[]})),
      fetch('/api/assinaturas/banco').then(r => r.json()).catch(() => ({tecnicos:{},total:0})),
    ]).then(([p, b]) => {
      setPendentes(p.pendentes || []);
      setBanco({tecnicos: b.tecnicos || {}, total: b.total || 0});
      setCarregando(false);
    });
  };
  pUseEffect(() => { carregar(); }, []);

  const confirmar = (payload) => {
    if (!payload.texto || !payload.texto.trim()) { alert('Digite o que está escrito primeiro'); return; }
    setProcessando(payload.imagem);
    fetch('/api/assinaturas/confirmar', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    }).then(r => r.json()).then(res => {
      setProcessando('');
      if (res.ok) carregar();
      else alert('Erro: ' + (res.mensagem || res.erro || 'desconhecido'));
    }).catch(() => setProcessando(''));
  };

  const descartar = (imagem) => {
    setProcessando(imagem);
    fetch('/api/assinaturas/descartar', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({imagem})
    }).then(() => { setProcessando(''); carregar(); }).catch(() => setProcessando(''));
  };

  // Lista de técnicos ordenada (do TECHNICIANS global)
  const nomesTecnicos = TECHNICIANS.map(t => t.name).sort();

  return (
    <div className="programar">
      <Panel title="✍️ Revisão de caligrafia"
             subtitle="O motor recorta cada pedaço escrito das OS (nomes, horários, observações). Digite o que está escrito em cada recorte e grave — isso forma a base de caligrafia. O que não prestar, descarte. Quanto mais você grava, mais o motor acerta sozinho e menos recortes aparecem.">
        <div style={{display:'flex', gap:12, marginBottom:14, flexWrap:'wrap'}}>
          <div className="qk" style={{minWidth:130}}><div className="qk-v">{pendentes.length}</div><div className="qk-l">A revisar</div></div>
          <div className="qk" style={{minWidth:130}}><div className="qk-v">{banco.total}</div><div className="qk-l">Amostras no banco</div></div>
          <div className="qk" style={{minWidth:130}}><div className="qk-v">{Object.keys(banco.tecnicos).length}</div><div className="qk-l">Rótulos</div></div>
          <button className="btn-ghost-sm" style={{marginLeft:'auto', alignSelf:'center'}} onClick={carregar}>↻ Atualizar</button>
        </div>

        {carregando && <div className="muted-sm" style={{padding:'24px 8px', textAlign:'center'}}>Carregando...</div>}

        {!carregando && pendentes.length === 0 && (
          <div className="muted-sm" style={{padding:'24px 8px', textAlign:'center'}}>
            ✅ Nenhum recorte pendente. Conforme novas OS forem escaneadas, os recortes de caligrafia aparecem aqui.
          </div>
        )}

        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(260px, 1fr))', gap:14}}>
          {pendentes.map(p => (
            <RevisaoCard key={p.imagem} item={p} nomes={nomesTecnicos}
              onConfirmar={confirmar} onDescartar={descartar}
              ocupado={processando === p.imagem}/>
          ))}
        </div>

        {Object.keys(banco.tecnicos).length > 0 && (
          <div style={{marginTop:22, borderTop:'1px solid var(--border)', paddingTop:14}}>
            <div className="muted-sm" style={{marginBottom:8, fontWeight:600}}>📚 Banco atual por técnico</div>
            <div style={{display:'flex', flexWrap:'wrap', gap:8}}>
              {Object.entries(banco.tecnicos).sort((a,b) => b[1]-a[1]).map(([nome, qtd]) => (
                <span key={nome} style={{fontSize:12, padding:'3px 10px', borderRadius:12,
                  background:'var(--surface)', border:'1px solid var(--border)'}}>
                  {nome} <b style={{color: qtd >= 5 ? 'var(--ok)' : qtd >= 2 ? 'var(--amber)' : 'var(--muted)'}}>{qtd}</b>
                </span>
              ))}
            </div>
          </div>
        )}
      </Panel>
    </div>
  );
}

function RevisaoCard({ item, nomes, onConfirmar, onDescartar, ocupado }) {
  const [texto, setTexto] = pUseState(item.texto_sugerido || '');
  // Zoom + pan (mãozinha) no recorte
  const [escala, setEscala] = pUseState(1);
  const [pos, setPos] = pUseState({x:0, y:0});
  const dragRef = React.useRef({on:false, sx:0, sy:0, ox:0, oy:0});

  const inputStyle = {fontSize:14, padding:'7px 8px', borderRadius:6, border:'1px solid var(--border)', background:'var(--bg)', width:'100%'};
  const gravar = () => onConfirmar({imagem:item.imagem, texto});

  const onWheel = (e) => {
    e.preventDefault();
    setEscala(s => Math.min(6, Math.max(1, s + (e.deltaY < 0 ? 0.3 : -0.3))));
  };
  const onDown = (e) => {
    if (escala <= 1) return;
    dragRef.current = {on:true, sx:e.clientX, sy:e.clientY, ox:pos.x, oy:pos.y};
  };
  const onMove = (e) => {
    if (!dragRef.current.on) return;
    setPos({x: dragRef.current.ox + (e.clientX - dragRef.current.sx),
            y: dragRef.current.oy + (e.clientY - dragRef.current.sy)});
  };
  const onUp = () => { dragRef.current.on = false; };
  const reset = () => { setEscala(1); setPos({x:0,y:0}); };

  const campoLabel = ROTULO_CAMPO[item.campo] || item.campo || '';

  return (
    <div style={{border:'1px solid var(--border)', borderRadius:10, padding:12, background:'var(--surface)'}}>
      {/* Visualizador com zoom (scroll/＋－) e mãozinha (arrastar) */}
      <div style={{position:'relative', background:'#fff', borderRadius:6, marginBottom:8, height:160, overflow:'hidden',
                   cursor: escala > 1 ? 'grab' : 'default', display:'flex', alignItems:'center', justifyContent:'center'}}
           onWheel={onWheel} onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}>
        <img src={`/api/assinaturas/img/${item.imagem}`} alt="recorte manuscrito" draggable="false"
             style={{maxWidth:'100%', maxHeight:'100%', objectFit:'contain', userSelect:'none',
                     transform:`translate(${pos.x}px,${pos.y}px) scale(${escala})`,
                     transformOrigin:'center center', transition: dragRef.current.on ? 'none' : 'transform .08s'}}/>
        {/* controles de zoom */}
        <div style={{position:'absolute', right:6, bottom:6, display:'flex', gap:4}} onMouseDown={e=>e.stopPropagation()}>
          <button className="btn-ghost-sm" style={{padding:'1px 7px',fontSize:14,lineHeight:1.2}} onClick={()=>setEscala(s=>Math.min(6,s+0.4))}>＋</button>
          <button className="btn-ghost-sm" style={{padding:'1px 7px',fontSize:14,lineHeight:1.2}} onClick={()=>setEscala(s=>Math.max(1,s-0.4))}>－</button>
          <button className="btn-ghost-sm" style={{padding:'1px 7px',fontSize:11}} onClick={reset} title="Resetar zoom">⟲</button>
        </div>
      </div>

      <div className="muted-sm" style={{marginBottom:6, display:'flex', justifyContent:'space-between'}}>
        <span>OS <b>{item.num_os}</b></span>
        {campoLabel && <span style={{fontSize:11, color:'var(--accent)'}}>{campoLabel}</span>}
      </div>

      {item.texto_sugerido && (
        <div className="muted-sm" style={{fontSize:11, marginBottom:4, color:'var(--accent)'}}>
          🧠 Sugestão do banco: <b>{item.texto_sugerido}</b>
          {typeof item.confianca_sugestao === 'number' && ` (${Math.round(item.confianca_sugestao*100)}%)`}
          {' '}— confira e corrija se preciso
        </div>
      )}
      <label className="muted-sm" style={{fontSize:11}}>Digite o que está escrito no recorte</label>
      <input value={texto} onChange={e => setTexto(e.target.value)} disabled={ocupado}
             autoComplete="off" placeholder="ex.: nome, 08:30, observação…"
             onKeyDown={e => { if (e.key === 'Enter' && texto.trim()) gravar(); }}
             style={{...inputStyle, marginBottom:8}}/>

      <div style={{display:'flex', gap:6}}>
        <button className="btn-primary-sm" style={{flex:1}} disabled={ocupado || !texto.trim()}
          onClick={gravar}>
          {ocupado ? '...' : '✓ Gravar'}
        </button>
        <button className="btn-ghost-sm" style={{color:'#c0392b', borderColor:'#c0392b'}} disabled={ocupado}
          onClick={() => onDescartar(item.imagem)} title="Descartar este recorte">
          Descartar
        </button>
      </div>
      <div className="muted-sm" style={{fontSize:10, marginTop:5, textAlign:'center'}}>scroll ou ＋/－ p/ zoom · arraste p/ mover</div>
    </div>
  );
}

<script type="text/babel">
// GESTÃO, COMPRAS, SUPERVISÃO

const { useState: gUseState, useMemo: gUseMemo } = React;

// ─── GESTÃO ────────────────────────────────────────────────────────────
function Gestao({ data }) {
  const [tab, setTab] = gUseState('exec');

  const stats = gUseMemo(() => {
    const total = data.length;
    const fechadas = data.filter(x => x.status === 'fechada_sup').length;
    const et = (k) => data.filter(x => (x.etapaBpms || x.status) === k).length;
    const criticasAbertas = data.filter(x => x.sectorCritical && x.status !== 'fechada_sup').length;
    const backlog = et('aguarda_supervisao');
    const aguardandoMaterial = et('aguardando_material') + et('aguarda_comprador');
    // Tempo médio real (OS com início e fim registrados)
    const comHora = data.filter(o => calcMinutos(o.hora_inicio, o.hora_fim) > 0);
    const mediaMin = comHora.length ? Math.round(comHora.reduce((s, o) => s + calcMinutos(o.hora_inicio, o.hora_fim), 0) / comHora.length) : 0;
    const tempoMedio = formatHoras(mediaMin);
    // Equipe com OS aberta
    const execAtivos = new Set(data.filter(o => o.executor && o.status !== 'fechada_sup')
      .map(o => o.executor.trim().split(' ')[0].toLowerCase()));
    // Top setores por volume
    const porSetor = {};
    data.forEach(o => { const s = (o.sector || '—').trim(); if (s) porSetor[s] = (porSetor[s] || 0) + 1; });
    const topSetores = Object.entries(porSetor).sort((a, b) => b[1] - a[1]).slice(0, 5);
    return { total, fechadas, criticas: criticasAbertas, backlog, aguardandoMaterial,
             tempoMedio, equipeAtiva: execAtivos.size, topSetores };
  }, [data]);

  return (
    <div className="view gestao-view">
      <div className="gestao-hd">
        <div>
          <h2 className="view-h">Gestão · Painel Executivo</h2>
          <div className="muted-sm">Leandro · Gestor · Mai 2026 vs Abr 2026</div>
        </div>
        <div className="plan-tabs">
          <button className={tab==='exec'?'plan-tab-on':''} onClick={() => setTab('exec')}>Painel Executivo</button>
          <button className={tab==='horas'?'plan-tab-on':''} onClick={() => setTab('horas')}>Horas Trabalhadas</button>
          <button className={tab==='relatorios'?'plan-tab-on':''} onClick={() => setTab('relatorios')}>Construtor de Relatórios</button>
          <button className={tab==='chat'?'plan-tab-on':''} onClick={() => setTab('chat')}>Chat Estratégico</button>
          <button className={tab==='fluxo'?'plan-tab-on':''} onClick={() => setTab('fluxo')}>Trilha da O.S</button>
        </div>
      </div>

      {tab === 'exec' && <PainelExecutivo data={data} stats={stats}/>}
      {tab === 'horas' && <HorasTrabalhadas data={data}/>}
      {tab === 'relatorios' && <ConstrutorRelatorios/>}
      {tab === 'chat' && <ChatEstrategico/>}
      {tab === 'fluxo' && <window.FluxoOS data={data} papel="gestao"/>}
    </div>
  );
}

          {stats.criticas > 0 && (

      <div className="grid-2">

            {SUPERVISORS.map((s, i) => {

function ExecKPI({ label, value, sub, tone }) {
  const t = TONE[tone] || TONE.slate;
  return (
    <div className="exec-kpi">
      <div className="exec-kpi-label">{label}</div>
      <div className="exec-kpi-value" style={{ color: t.fg }}>{value}</div>
      <div className="exec-kpi-sub">{sub}</div>
    </div>
  );
}

// ─── HORAS TRABALHADAS ────────────────────────────────────────────────
function parseHora(h) {
  if (!h && h !== 0) return null;
  const s = String(h).trim();
  if (!s) return null;
  const m = s.match(/^(\d{1,2})[:.]?(\d{2})/);
  if (!m) return null;
  const hh = parseInt(m[1], 10);
  const mm = parseInt(m[2], 10);
  if (isNaN(hh) || isNaN(mm) || hh > 23 || mm > 59) return null;
  return hh * 60 + mm;
}

function calcMinutos(ini, fim) {
  const a = parseHora(ini);
  const b = parseHora(fim);
  if (a == null || b == null) return 0;
  let diff = b - a;
  if (diff < 0) diff += 24 * 60;
  if (diff > 16 * 60) return 0;
  return diff;
}

function formatHoras(min) {
  if (!min || min <= 0) return '0h';
  const h = Math.floor(min / 60);
  const m = min % 60;
  if (h === 0) return `${m}min`;
  if (m === 0) return `${h}h`;
  return `${h}h${String(m).padStart(2, '0')}`;
}

function HorasTrabalhadas({ data }) {
  const [filtroSup, setFiltroSup] = gUseState('todos');
  const [ordem, setOrdem] = gUseState('horas');

  const stats = gUseMemo(() => {
    const tecs = TECHNICIANS.map(t => {
      const norm = s => (s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
      const nomeNorm = norm(t.name);
      const primeiroNome = nomeNorm.split(' ')[0];
      const osDoTec = data.filter(x => {
        if (!x.executor) return false;
        const ex = norm(x.executor);
        return ex.includes(primeiroNome) || nomeNorm.includes(ex.split(' ')[0]);
      });

      const totalMin = osDoTec.reduce((s, o) => s + calcMinutos(o.hora_inicio, o.hora_fim), 0);
      const osComHora = osDoTec.filter(o => calcMinutos(o.hora_inicio, o.hora_fim) > 0).length;
      const osSemHora = osDoTec.length - osComHora;
      const concluidas = osDoTec.filter(o => o.status === 'fechada_sup').length;
      const criticas = osDoTec.filter(o => o.sectorCritical).length;
      const mediaMin = osComHora > 0 ? Math.round(totalMin / osComHora) : 0;

      return {
        name: t.name, supervisor: t.supervisor, specialty: t.specialty, status: t.status,
        note: t.note, dedicated: t.dedicated,
        totalOS: osDoTec.length, osComHora, osSemHora, concluidas, criticas,
        totalMin, mediaMin,
      };
    });

    const grandMin = tecs.reduce((s, t) => s + t.totalMin, 0);
    const grandOS = tecs.reduce((s, t) => s + t.osComHora, 0);
    const tecsAtivos = tecs.filter(t => t.totalMin > 0).length;
    const mediaPorTecnico = tecsAtivos > 0 ? Math.round(grandMin / tecsAtivos) : 0;

    const porSup = SUPERVISORS.map(s => {
      const eq = tecs.filter(t => t.supervisor === s.id);
      const minutos = eq.reduce((acc, t) => acc + t.totalMin, 0);
      const os = eq.reduce((acc, t) => acc + t.osComHora, 0);
      return { id: s.id, name: s.name, area: s.area, minutos, os, ntec: eq.length };
    });

    const totalNoDataset = data.length;
    const totalComHora = data.filter(o => calcMinutos(o.hora_inicio, o.hora_fim) > 0).length;
    const cobertura = totalNoDataset > 0 ? Math.round((totalComHora / totalNoDataset) * 100) : 0;

    return { tecs, grandMin, grandOS, mediaPorTecnico, porSup, totalNoDataset, totalComHora, cobertura };
  }, [data]);

  const tecsView = gUseMemo(() => {
    let arr = stats.tecs;
    if (filtroSup !== 'todos') arr = arr.filter(t => t.supervisor === filtroSup);
    arr = [...arr].sort((a, b) => {
      if (ordem === 'horas') return b.totalMin - a.totalMin;
      if (ordem === 'os')    return b.totalOS - a.totalOS;
      if (ordem === 'media') return b.mediaMin - a.mediaMin;
      if (ordem === 'nome')  return a.name.localeCompare(b.name);
      return 0;
    });
    return arr;
  }, [stats, filtroSup, ordem]);

  const maxHoras = Math.max(...stats.tecs.map(t => t.totalMin), 1);
  const topTec = [...stats.tecs].sort((a, b) => b.totalMin - a.totalMin)[0];
  const maisProdutivo = [...stats.tecs].filter(t => t.osComHora >= 3).sort((a, b) => a.mediaMin - b.mediaMin)[0];

  return (
    <div className="exec">
      <div className="exec-kpis">
        <ExecKPI label="Total de horas" value={formatHoras(stats.grandMin)}
                 sub={`${stats.grandOS} OS com horário registrado`} tone="blue"/>
        <ExecKPI label="Média por técnico" value={formatHoras(stats.mediaPorTecnico)}
                 sub={`considera ${stats.tecs.filter(t => t.totalMin > 0).length} técnicos ativos`} tone="teal"/>
        <ExecKPI label="Top de horas" value={topTec ? topTec.name.split(' ')[0] : '—'}
                 sub={topTec ? `${formatHoras(topTec.totalMin)} · ${topTec.totalOS} OS` : 'sem dados'} tone="green"/>
        <ExecKPI label="Mais produtivo" value={maisProdutivo ? maisProdutivo.name.split(' ')[0] : '—'}
                 sub={maisProdutivo ? `${formatHoras(maisProdutivo.mediaMin)} médios por OS` : 'mín. 3 OS'} tone="green"/>
        <ExecKPI label="Cobertura de horários" value={`${stats.cobertura}%`}
                 sub={`${stats.totalComHora} de ${stats.totalNoDataset} OS preenchidas`}
                 tone={stats.cobertura >= 70 ? 'green' : stats.cobertura >= 40 ? 'orange' : 'danger'}/>
        <ExecKPI label="OS sem horário" value={stats.totalNoDataset - stats.totalComHora}
                 sub="precisam revisão do supervisor" tone="orange"/>
      </div>

      {stats.cobertura < 70 && stats.totalNoDataset > 0 && (
        <Panel title="⚠ Cobertura de horários abaixo de 70%" subtitle="Quanto mais OS com horário preenchido, mais precisos os indicadores">
          <div className="alert-list">
            <div className="alert-row alert-warn">
              <span className="alert-ic">📋</span>
              <span className="alert-text">
                {stats.totalNoDataset - stats.totalComHora} OS sem horário de início/fim · {Math.round(100 - stats.cobertura)}% das horas reais não estão sendo computadas
              </span>
              <button className="btn-ghost-sm">Ver OS pendentes</button>
            </div>
          </div>
        </Panel>
      )}

      <Panel title="Ranking por colaborador" subtitle={`${tecsView.length} técnicos · clique para detalhar`}
             action={
               <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                 <span className="muted-sm">Equipe:</span>
                 <button className={`chip ${filtroSup === 'todos' ? 'chip-on' : ''}`} onClick={() => setFiltroSup('todos')}>Todos</button>
                 <button className={`chip ${filtroSup === 'paulo' ? 'chip-on' : ''}`} onClick={() => setFiltroSup('paulo')}>Paulo</button>
                 <button className={`chip ${filtroSup === 'carlos' ? 'chip-on' : ''}`} onClick={() => setFiltroSup('carlos')}>Carlos</button>
                 <button className={`chip ${filtroSup === 'walter' ? 'chip-on' : ''}`} onClick={() => setFiltroSup('walter')}>Walter</button>
                 <span style={{ width: 8 }}/>
                 <span className="muted-sm">Ordenar:</span>
                 <select value={ordem} onChange={e => setOrdem(e.target.value)}
                         style={{ fontSize: 11.5, padding: '4px 8px', border: '1px solid var(--border)', borderRadius: 5, background: 'var(--surface-2)', color: 'var(--text)' }}>
                   <option value="horas">Mais horas</option>
                   <option value="os">Mais OS</option>
                   <option value="media">Maior média/OS</option>
                   <option value="nome">Nome (A–Z)</option>
                 </select>
               </div>
             }>
        <div className="horas-table">
          <div className="horas-thead">
            <div>Colaborador</div>
            <div className="horas-th-right">OS</div>
            <div className="horas-th-right">c/ horário</div>
            <div className="horas-th-right">Concluídas</div>
            <div className="horas-th-right">Críticas</div>
            <div className="horas-th-right">Média/OS</div>
            <div>Total de horas</div>
          </div>
          {tecsView.map(t => {
            const isTop = topTec && t.name === topTec.name && t.totalMin > 0;
            const widthPct = (t.totalMin / maxHoras) * 100;
            const sup = SUPERVISORS.find(s => s.id === t.supervisor);
            return (
              <div key={t.name} className={`horas-row ${isTop ? 'horas-row-top' : ''}`}>
                <div className="horas-c-name">
                  <Avatar name={t.name} status={t.status} size={28}/>
                  <div>
                    <div className="horas-name">{t.name}{isTop && <span className="star-tag" style={{ marginLeft: 8 }}>⭐ TOP</span>}</div>
                    <div className="horas-sub">
                      <span style={{ background: specColor(t.specialty), width: 6, height: 6, display: 'inline-block', borderRadius: '50%', marginRight: 5 }}/>
                      {SPECIALTIES.find(x => x.id === t.specialty)?.label || t.specialty}
                      {sup && <span> · {sup.name.split(' ')[0]}</span>}
                      {t.note && <span> · {t.note}</span>}
                    </div>
                  </div>
                </div>
                <div className="horas-cell mono">{t.totalOS}</div>
                <div className="horas-cell mono" title={`${t.osSemHora} sem horário`}>
                  {t.osComHora}{t.osSemHora > 0 && <span className="muted-sm"> /{t.totalOS}</span>}
                </div>
                <div className="horas-cell mono ok-text">{t.concluidas}</div>
                <div className="horas-cell mono danger-text">{t.criticas || '—'}</div>
                <div className="horas-cell mono">{t.mediaMin > 0 ? formatHoras(t.mediaMin) : '—'}</div>
                <div className="horas-bar-wrap">
                  <div className="horas-bar-track">
                    <div className="horas-bar-fill" style={{ width: `${widthPct}%`, background: isTop ? 'var(--ok)' : 'var(--accent)' }}/>
                  </div>
                  <div className="horas-bar-val">{formatHoras(t.totalMin)}</div>
                </div>
              </div>
            );
          })}
          {tecsView.length === 0 && (
            <div style={{ padding: '40px 12px', textAlign: 'center', color: 'var(--muted)', fontSize: 13 }}>
              Nenhum técnico nessa equipe.
            </div>
          )}
        </div>
      </Panel>

      <div className="grid-2">
        <Panel title="Horas por equipe" subtitle="Somatório das horas executadas no período">
          <HBarList rows={stats.porSup.map(s => ({
            id: s.id,
            label: `${s.name} · ${s.ntec} téc.`,
            value: Math.round(s.minutos / 60),
            color: 'var(--accent)',
          }))} valueWidth={70} showPct/>
          <div style={{ marginTop: 14, paddingTop: 12, borderTop: '1px dashed var(--border)' }}>
            {stats.porSup.map(s => (
              <div key={s.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0', fontSize: 12 }}>
                <span style={{ color: 'var(--muted)' }}>{s.name}</span>
                <span><span className="mono">{formatHoras(s.minutos)}</span> · {s.os} OS · média <span className="mono">{s.os > 0 ? formatHoras(Math.round(s.minutos / s.os)) : '—'}</span>/OS</span>
              </div>
            ))}
          </div>
        </Panel>

        <Panel title="💡 Insights de produtividade" subtitle="Análise automática do período">
          <div className="insights">
            {(() => {
              const insights = [];
              if (topTec && topTec.totalMin > 0) {
                insights.push({ ic: '⭐', txt: `${topTec.name} é o técnico com mais horas no período (${formatHoras(topTec.totalMin)} em ${topTec.totalOS} OS)` });
              }
              if (maisProdutivo) {
                insights.push({ ic: '⚡', txt: `${maisProdutivo.name} fecha OS mais rápido na média (${formatHoras(maisProdutivo.mediaMin)} por OS · ${maisProdutivo.osComHora} OS analisadas)` });
              }
              const topEq = [...stats.porSup].sort((a, b) => b.minutos - a.minutos)[0];
              if (topEq && topEq.minutos > 0) {
                const pctEq = stats.grandMin > 0 ? Math.round((topEq.minutos / stats.grandMin) * 100) : 0;
                insights.push({ ic: '🏗', txt: `Equipe do ${topEq.name.split(' ')[0]} respondeu por ${pctEq}% do total de horas (${formatHoras(topEq.minutos)})` });
              }
              const semHora = stats.tecs.filter(t => t.totalOS > 0 && t.osComHora === 0).length;
              if (semHora > 0) {
                insights.push({ ic: '📋', txt: `${semHora} técnico(s) têm OS atribuídas mas nenhuma com horário preenchido — supervisores precisam revisar` });
              }
              const semOS = stats.tecs.filter(t => t.totalOS === 0).length;
              if (semOS > 0) {
                insights.push({ ic: '👁', txt: `${semOS} técnico(s) sem OS no período — confira atestado/férias/folga` });
              }
              if (stats.cobertura < 50 && stats.totalNoDataset > 0) {
                insights.push({ ic: '⚠', txt: `Cobertura de horários é de apenas ${stats.cobertura}% — números abaixo são uma amostra, não o total` });
              }
              if (insights.length === 0) {
                insights.push({ ic: '📊', txt: 'Sem dados suficientes para gerar insights neste período' });
              }
              return insights.map((i, k) => (
                <div key={k} className="insight-row">
                  <span className="insight-ic">{i.ic}</span>
                  <span className="insight-text">{i.txt}</span>
                </div>
              ));
            })()}
          </div>
        </Panel>
      </div>
    </div>
  );
}
