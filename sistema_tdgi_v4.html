function Compras({ data = [], onOpenOS }) {
  const [tab, setTab] = gUseState('painel');
  const et = (k) => data.filter(x => (x.etapaBpms || x.status) === k);
  const aguardaComprador = et('aguarda_comprador');
  const aguardandoMaterial = et('aguardando_material');
  const materialChegou = et('material_chegou');
  const filaPedidos = [...aguardaComprador, ...aguardandoMaterial, ...materialChegou];

  return (
    <div className="view compras-view">
      <div className="compras-hd">
        <div>
          <h2 className="view-h">Compras · {COMPRADOR.name}</h2>
          <div className="muted-sm">Fila de materiais · controle de baixa no MV · alertas de estoque</div>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <div className="plan-tabs">
            <button className={tab==='painel'?'plan-tab-on':''} onClick={() => setTab('painel')}>Painel</button>
            <button className={tab==='fluxo'?'plan-tab-on':''} onClick={() => setTab('fluxo')}>Trilha da O.S</button>
          </div>
          <button className="btn-ghost-sm">{Ic.download}<span>Exportar baixa MV</span></button>
          <button className="btn-primary-sm">{Ic.plus}<span>Novo pedido</span></button>
        </div>
      </div>

      {tab === 'fluxo' && <window.FluxoOS data={data} papel="comprador"/>}
      {tab === 'painel' && <>

      <div className="kpi-row">
        <KPI label="Aguarda comprador" value={aguardaComprador.length} sub="precisa cotar/pedir" accent="blue"/>
        <KPI label="Aguardando material" value={aguardandoMaterial.length} sub="compra em andamento" accent="teal"/>
        <KPI label="Material chegou" value={materialChegou.length} sub="pronto p/ programar" accent="green"/>
        <KPI label="Críticas na fila" value={filaPedidos.filter(o => o.sectorCritical).length} sub="setor crítico" accent="red"/>
      </div>

      <div className="compras-grid">
        <Panel title="Fila de pedidos" subtitle="OS reais que dependem de material · clique pra abrir a OS">
          <div className="mat-list">
            {filaPedidos.length === 0 && <div className="muted-sm" style={{padding:12}}>Nenhuma OS aguardando material.</div>}
            {filaPedidos.map(o => {
              const etapa = o.etapaBpms || o.status;
              const stLabel = etapa === 'material_chegou' ? 'Material chegou'
                : etapa === 'aguardando_material' ? 'Aguardando material' : 'Aguarda comprador';
              const stTone = etapa === 'material_chegou' ? TONE.green
                : etapa === 'aguardando_material' ? TONE.teal : TONE.blue;
              return (
                <div key={o.id} className="mat-row" onClick={() => onOpenOS && onOpenOS(o.id)} style={{cursor:'pointer'}}>
                  <div className="mat-os">OS {o.num}</div>
                  <div className="mat-item">
                    <div className="mat-item-name">{(o.description || 'Sem descrição').slice(0, 60)}</div>
                    <div className="mat-item-sub">{o.sector} · {o.executor ? o.executor.split(' ')[0] : '—'}</div>
                  </div>

function ImportCard({ title, desc, accept, badge, multiple, onUpload }) {
  const [status, setStatus] = React.useState('idle'); // idle, uploading, done, error
  const [resultado, setResultado] = React.useState('');
  const inputRef = React.useRef(null);

  async function handleFiles(files) {
    if (!files || files.length === 0) return;
    setStatus('uploading');
    setResultado('');
    // Envia para o servidor local que vai mover para pasta Pendentes do Drive
    try {
      const formData = new FormData();
      Array.from(files).forEach(f => formData.append('file', f));
      const resp = await fetch('/api/upload', {
        method: 'POST',
        body: formData,
        signal: AbortSignal.timeout(30000)
      });
      if (resp.ok) {
        const data = await resp.json();
        setStatus('done');
        setResultado(data.mensagem || `${files.length} arquivo(s) enviado(s)`);
      } else {
        throw new Error('Erro no servidor');
      }
    } catch(e) {
      // Fallback: informa que deve usar o Drive diretamente
      setStatus('done');
      setResultado(`Salve na pasta Pendentes do Drive para processar automaticamente`);
    }
  }

  function onDrop(e) {
    e.preventDefault();
    handleFiles(e.dataTransfer.files);
  }

  return (
    <div className="imp-card" onDrop={onDrop} onDragOver={e => e.preventDefault()}>
      {badge && <span className="imp-badge">{badge}</span>}
      <div className="imp-icon">{status === 'uploading' ? '⏳' : status === 'done' ? '✅' : '📥'}</div>
      <div className="imp-title">{title}</div>
      <div className="imp-desc">{desc}</div>
      {resultado && <div className="imp-desc" style={{color:'var(--ok)',fontWeight:500}}>{resultado}</div>}
      <div className="imp-drop">
        <div className="muted-sm">{status === 'uploading' ? 'Enviando...' : 'arraste arquivos aqui'}</div>
        {status !== 'uploading' && <>
          <div className="muted-sm">ou</div>
          <button className="btn-secondary-sm" onClick={() => inputRef.current?.click()}>Selecionar...</button>
          <input ref={inputRef} type="file" accept={accept} multiple={multiple} style={{display:'none'}}
                 onChange={e => handleFiles(e.target.files)}/>
        </>}
      </div>
    </div>
  );
}

// ─── MODO PROGRAMADOR (chat REAL → localhost:8080) ────────────────────
const { useState: progUseState, useEffect: progUseEffect, useRef: progUseRef } = React;

const MOTOR_URL = window.location.origin || 'http://localhost:8080';

function Programador() {
  const [msgs, setMsgs] = progUseState([
    { who: 'ia', t: agora(), text: '👋 Motor conectado! Pode perguntar sobre OS, técnicos, setores, programação ou qualquer coisa da TDGI.' }
  ]);
  const [input, setInput] = progUseState('');
  const [carregando, setCarregando] = progUseState(false);
  const [motorStatus, setMotorStatus] = progUseState('verificando'); // 'online' | 'offline' | 'verificando'
  const [historico, setHistorico] = progUseState([]);
  const [perfilStats, setPerfilStats] = progUseState({ regras: 0, fatos: 0, correcoes: 0 });
  const chatRef = progUseRef(null);

  const exemplos = [
    'O que está no primeiro atendimento agora?',
    'Quais OS críticas estão abertas?',
    'Quem tem mais OS pendentes?',
    'O que programar para hoje?',
    'Resumo do dia',
    'Quais OS estão aguardando supervisão?',
    'Quantas OS abertas temos no total?',
    'Quem está sobrecarregado?',
  ];

  function agora() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  // Verificar status do motor ao montar, carregar perfil e histórico persistido
  progUseEffect(() => {
    verificarMotor();
    carregarPerfil();
    // Carrega últimas 20 conversas do servidor
    fetch('/api/memoria').then(r => r.ok ? r.json() : null).then(d => {
      if (!d || !d.conversas || d.conversas.length === 0) return;
      const msgsAnteriores = [];
      d.conversas.slice(-20).forEach(c => {
        const ts = c.timestamp ? new Date(c.timestamp).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';
        if (c.conteudo?.pergunta) msgsAnteriores.push({ who: 'user', t: ts, text: c.conteudo.pergunta });
        if (c.conteudo?.resposta) msgsAnteriores.push({ who: 'ia',   t: ts, text: c.conteudo.resposta });
        // reconstrói historico multi-turn
        if (c.conteudo?.pergunta) setHistorico(prev => [...prev, {role:'user',  text: c.conteudo.pergunta}]);
        if (c.conteudo?.resposta) setHistorico(prev => [...prev, {role:'model', text: c.conteudo.resposta}]);
      });
      if (msgsAnteriores.length > 0) {
        setMsgs(prev => [
          ...prev,
          { who:'ia', t:'', text:`── histórico das últimas ${d.conversas.slice(-20).length} conversas ──`, _sep:true },
          ...msgsAnteriores
        ]);
      }
    }).catch(() => {});
  }, []);

  // Auto-scroll: rAF garante que o DOM já cresceu antes de scrollar
  progUseEffect(() => {
    requestAnimationFrame(() => {
      if (chatRef.current) {
        chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }
    });
  }, [msgs]);

  async function carregarPerfil() {
    try {
      const r = await fetch('/api/claudinho/perfil');
      if (r.ok) {
        const d = await r.json();
        setPerfilStats({
          regras: (d.regras || []).length,
          fatos: (d.fatos_hospital || []).length,
          correcoes: (d.correcoes || []).length,
        });
      }
    } catch {}
  }

  async function darFeedback(msg, aprovado) {
    const correcao = aprovado ? undefined : window.prompt('Qual seria a resposta correta?');
    if (!aprovado && !correcao) return;
    try {
      await fetch('/api/claudinho/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pergunta: msg._pergunta || '', resposta: msg.text, aprovado, correcao })
      });
      setMsgs(prev => prev.map((m, idx) =>
        m === msg ? { ...m, _feedback: aprovado ? 'ok' : 'corrigido' } : m
      ));
      if (!aprovado && correcao) carregarPerfil();
      if (aprovado) carregarPerfil();
    } catch {}
  }

  async function ensinar() {
    const tipo = window.prompt('Tipo (regra / fato / correcao / exemplo):');
    if (!tipo) return;
    const conteudo = window.prompt('Conteúdo:');
    if (!conteudo) return;
    try {
      await fetch('/api/claudinho/aprender', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tipo: tipo.trim().toLowerCase(), conteudo })
      });
      carregarPerfil();
      alert('✅ Aprendizado salvo!');
    } catch { alert('Erro ao salvar.'); }
  }

  async function verificarMotor() {
    try {
      const r = await fetch(`${MOTOR_URL}/api/status`, { signal: AbortSignal.timeout(4000) });
      if (!r.ok) { setMotorStatus('offline'); return; }
      const d = await r.json();
      // Servidor online mas Ollama offline → mostra offline para o usuário não ficar confuso
      if (d.ollama === 'offline') {
        setMotorStatus('offline');
        setMsgs(prev => {
          const jaAvisou = prev.some(m => m._ollamaWarn);
          if (jaAvisou) return prev;
          return [...prev, { who: 'ia', t: agora(), _ollamaWarn: true,
            text: '⚠️ Servidor OK, mas Ollama está offline.\n\nInicie o Ollama antes de usar o chat:\n  ollama serve\n\nDepois clique em ↻ para reconectar.',
            erro: true }];
        });
      } else {
        setMotorStatus('online');
      }
    } catch {
      setMotorStatus('offline');
    }
  }

  async function enviar(texto) {
    const pergunta = (texto || input).trim();
    if (!pergunta || carregando) return;
    setInput('');

    const novaMsgUser = { who: 'user', t: agora(), text: pergunta };
    setMsgs(prev => [...prev, novaMsgUser]);
    setCarregando(true);

    // Detecta pedidos explícitos de memória ("lembra disso", "anota", ...)
    const pedidoMemoria = /\b(lembra|lembre|guarda|guarde|anota|anote|salva|salve|memoriza|memorize)\b/i.test(pergunta);

    // Até 3 tentativas silenciosas para iniciar a conexão; depois a resposta chega em stream
    let resp = null, ultimoErro = null;
    for (let tentativa = 1; tentativa <= 3; tentativa++) {
      try {
        const r = await fetch(`${MOTOR_URL}/api/chat/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pergunta, historico, salvar_memoria: pedidoMemoria }),
          signal: AbortSignal.timeout(600000)
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        resp = r;
        break;
      } catch (err) {
        ultimoErro = err;
        if (tentativa < 3) await new Promise(r2 => setTimeout(r2, 4000 * tentativa));
      }
    }

    if (resp) {
      // Bolha vazia que vai sendo preenchida conforme o Qwen digita
      const idMsg = Date.now();
      setMsgs(prev => [...prev, { who: 'ia', t: agora(), text: '', _id: idMsg, _digitando: true, _pergunta: pergunta }]);
      setCarregando(false);

      let resposta = '';
      try {
        const reader = resp.body.getReader();
        const decoder = new TextDecoder('utf-8');
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          resposta += decoder.decode(value, { stream: true });
          const t = resposta;
          setMsgs(prev => prev.map(m => m._id === idMsg ? { ...m, text: t } : m));
        }
      } catch (err) {
        resposta += `\n⚠️ Conexão interrompida: ${err.message}`;
      }
      const final = resposta;
      setMsgs(prev => [
        ...prev.map(m => m._id === idMsg ? { ...m, text: final, _digitando: false } : m),
        ...(pedidoMemoria ? [{ who: 'sistema', t: agora(), text: '🧠 Pedido de memória registrado' }] : [])
      ]);
      setHistorico(prev => [
        ...prev,
        { role: 'user', text: pergunta },
        { role: 'model', text: final }
      ]);
      if (pedidoMemoria) carregarPerfil();
      setMotorStatus('online');
    } else {
      // Falhou de vez: remove o balão enviado e devolve o texto pro campo — só apertar Enter de novo
      setMsgs(prev => [
        ...prev.filter(m => m !== novaMsgUser),
        { who: 'sistema', t: agora(), text: `⚠️ Não consegui enviar (${ultimoErro?.message || 'erro'}). Sua mensagem voltou pro campo — aperte Enter para tentar de novo.` }
      ]);
      setInput(pergunta);
      setMotorStatus('offline');
    }
    setCarregando(false);
  }

  function onKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
  }

  const statusColor = motorStatus === 'online' ? 'var(--ok)' : motorStatus === 'offline' ? 'var(--danger)' : 'var(--amber)';
  const statusBg    = motorStatus === 'online' ? 'var(--ok-bg)' : motorStatus === 'offline' ? 'var(--danger-bg)' : 'var(--amber-bg)';
  const statusLabel = motorStatus === 'online' ? 'motor online' : motorStatus === 'offline' ? 'motor offline' : 'verificando…';

  return (
    <div className="view prog-view">
      <div className="prog-hd">
        <div>
          <h2 className="view-h">Modo Programador · Motor Real</h2>
          <div className="muted-sm">Chat conectado ao qwen2.5:7b · {window.location.host}</div>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          {historico.length > 0 && (
            <span className="pill" style={{ color: 'var(--accent)', background: 'var(--accent-bg)' }}>
              🧠 Memória ativa
            </span>
          )}
          <button className="btn-ghost-sm" onClick={ensinar} title="Ensinar algo ao Claudinho">✏ Ensinar</button>
          <span className="pill" style={{ color: statusColor, background: statusBg }}>
            <span className="pill-dot" style={{ background: statusColor }}/>
            {statusLabel}
          </span>
          <button className="btn-ghost-sm" onClick={verificarMotor}>↻</button>
        </div>
      </div>

      <div className="prog-layout">
        <div className="prog-chat">
          <div ref={chatRef} className="chat-est-body" style={{ flex: 1, minHeight: 0, overflowY: 'auto' }}>
            {msgs.map((m, i) => (
              m._sep ? (
                <div key={i} style={{textAlign:'center', fontSize:10, color:'var(--muted)', margin:'8px 0', borderTop:'1px dashed var(--border)', paddingTop:6}}>
                  {m.text}
                </div>
              ) : m.who === 'sistema' ? (
                <div key={i} style={{ textAlign: 'center', margin: '4px 0' }}>
                  <span style={{ fontSize: 11, background: 'var(--ok-bg)', color: 'var(--ok)', border: '1px solid var(--ok)', borderRadius: 20, padding: '3px 10px' }}>{m.text}</span>
                </div>
              ) :
              <div key={i} className={`chat-msg chat-${m.who === 'user' ? 'gestor' : 'ia'}`}>
                <div className="chat-bubble" style={m.erro ? { background: 'var(--danger-bg)', border: '1px solid var(--danger)' } : {}}>
                  <div className="chat-bubble-text" style={{ whiteSpace: 'pre-line' }}>{m.text}{m._digitando ? ' ▋' : ''}</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 4 }}>
                    <div className="chat-time">{m.t}</div>
                    {m.who === 'ia' && !m.erro && (
                      m._feedback ? (
                        <span style={{ fontSize: 11, color: 'var(--muted)' }}>
                          {m._feedback === 'ok' ? '✓ aprovado' : '✓ corrigido'}
                        </span>
                      ) : (
                        <>
                          <button
                            onClick={() => darFeedback(m, true)}
                            title="Aprovar resposta"
                            style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 14, padding: '0 2px', opacity: 0.6 }}
                          >👍</button>
                          <button
                            onClick={() => darFeedback(m, false)}
                            title="Corrigir resposta"
                            style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 14, padding: '0 2px', opacity: 0.6 }}
                          >👎</button>
                        </>
                      )
                    )}
                  </div>
                </div>
              </div>
            ))}
            {carregando && (
              <div className="chat-msg chat-ia">
                <div className="chat-bubble">
                  <div className="chat-bubble-text" style={{ color: 'var(--muted)' }}>
                    ⏳ Motor processando…
                  </div>
                </div>
              </div>
            )}
          </div>
          <div className="chat-input">
            <input
              type="text"
              placeholder={motorStatus === 'offline' ? '⚠ Motor offline — inicie o servidor.py' : 'Digite sua pergunta ou comando…'}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={onKey}
              disabled={carregando}
            />
            <button className="btn-primary-sm" onClick={() => enviar()} disabled={carregando || !input.trim()}>
              {carregando ? '…' : 'Enviar'}
            </button>
          </div>
        </div>

        <aside className="prog-side">
          <Panel title="Memória do Claudinho" subtitle="Aprendizado acumulado">
            <div className="prog-caps">
              <div className="prog-cap">🧠 {perfilStats.regras} regras · {perfilStats.fatos} fatos · {perfilStats.correcoes} correções aprendidas</div>
            </div>
          </Panel>

          <Panel title="Exemplos de perguntas" subtitle="Clique para usar">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {exemplos.map((e, i) => (
                <button key={i} className="prog-exemplo" onClick={() => enviar(e)}>"{e}"</button>
              ))}
            </div>
          </Panel>

          <Panel title="Motor · qwen2.5:7b" subtitle="Rodando localmente no seu PC">
            <div className="prog-caps">
              <div className="prog-cap">🔗 Endpoint: {new URL(MOTOR_URL).origin}/api/chat</div>
              <div className="prog-cap">🧠 Modelo: qwen2.5:7b via Ollama</div>
              <div className="prog-cap">📁 Banco: CLAUDINHO_BANCO_MEMORIA.json</div>
              <div className="prog-cap">✓ Conhece toda a equipe TDGI/HEV</div>
              <div className="prog-cap">✓ Conhece setores e supervisores</div>
              <div className="prog-cap">✓ Conhece rotinas e status de OS</div>
            </div>
          </Panel>
        </aside>
      </div>
    </div>
  );
}

<script type="text/babel">
// Main app — sidebar, top bar, view routing

const { useState: appUseState, useEffect: appUseEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "blue",
  "density": "regular",
  "showCompactSidebar": false,
  "monthLabel": "Maio · 2026"
}/*EDITMODE-END*/;

const ACCENT_PALETTES = {
  blue:   { accent: 'oklch(0.55 0.13 245)', accentSoft: 'oklch(0.94 0.04 245)' },
  teal:   { accent: 'oklch(0.55 0.11 195)', accentSoft: 'oklch(0.94 0.04 195)' },
  indigo: { accent: 'oklch(0.5 0.16 280)',  accentSoft: 'oklch(0.94 0.05 280)' },
  slate:  { accent: 'oklch(0.42 0.04 250)', accentSoft: 'oklch(0.94 0.01 250)' },
};

function mapOS(o, i) {
  const st = o.status || 'em_aberto';
  const trilha = o.trilha || TRILHA_DE_STATUS[st] || 'os_chegou';
  const crit = o.criticidade || (o.setor_critico === 'SIM' ? 'critico' : 'medio');
  const prio = o.prioridade || (o.setor_critico === 'SIM' ? 'alta' : 'media');
  return {
    id: o.num_os || String(i),
    num: o.num_os || '', num_os: o.num_os || '',
    description: o.servico || '', sector: o.setor || '',
    sectorCritical: o.setor_critico === 'SIM',
    executor: o.colaborador || '',
    supervisor: o.supervisor === 'Paulo Mares' ? 'paulo' : o.supervisor === 'Carlos Prado' ? 'carlos' : 'walter',
    supervisorName: o.supervisor || '',
    status: st,
    trilha: trilha,
    criticidade: crit,
    prioridade: prio,
    created: o.criado_em ? new Date(o.criado_em.replace(' ','T')) : new Date(),
    criado_em: o.criado_em || '', atualizado_em: o.atualizado_em || '',
    startedAt: null, closedArea: null, closedSup: null,
    signatures: (st === 'fechada_sup') ? 3 : (st === 'fechada_area') ? 1 : 0,
    specialty: o.especialidade || 'hidraulica',
    gut: { level: crit, score: crit==='critico'?80:crit==='alto'?60:crit==='medio'?40:20 },
    photos: 0, hasClientOS: false, obs: o.obs || '',
    hora_inicio: o.hora_inicio || '', hora_fim: o.hora_fim || '', data: o.data || '',
    servico_executado: o.servico_executado || '',
    drive_img_id: o.drive_img_id || '',
    link_drive: o.link_drive || (o.drive_img_id ? `https://drive.google.com/file/d/${o.drive_img_id}/view` : ''),
    link_pdf: o.link_pdf || '',
    imagem_local: o.imagem_local || '', etapaBpms: st,
    selos: Array.isArray(o.selos) ? o.selos : [],
    situacao: o.situacao || '',
    duvida: o.duvida === 1 || o.duvida === true, confianca: o.confianca || 0,
  };
}

function App() {
  const [tab, setTab] = appUseState('dashboard');
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [filters, setFilters] = appUseState({});
  const [openOS, setOpenOS] = appUseState(null);
  const [osReais, setOsReais] = appUseState(null);
  const [loadingOS, setLoadingOS] = appUseState(true);
  const [tecnicosLista, setTecnicosLista] = appUseState([]);

  appUseEffect(() => {
    fetch('/api/tecnicos').then(r=>r.json()).then(d => {
      if (d.tecnicos && d.tecnicos.length) setTecnicosLista(d.tecnicos);
    }).catch(() => {});
  }, []);

  appUseEffect(() => {
    const p = ACCENT_PALETTES[t.accent] || ACCENT_PALETTES.blue;
    document.documentElement.style.setProperty('--accent', p.accent);
    document.documentElement.style.setProperty('--accent-bg', p.accentSoft);
    document.documentElement.dataset.density = t.density;
  }, [t.accent, t.density]);

  const isStatic = window.location.protocol === 'file:' || window.location.hostname.includes('github.io');

  // Auto-atualiza a cada 10 segundos (desligado no GitHub Pages)
  appUseEffect(() => {
    if (isStatic) return;
    function refreshOS() {
      fetch('/api/os')
        .then(r => r.json())
        .then(d => {
          if (d.os) {
            try { setOsReais(d.os.map(mapOS)); } catch(e) { console.error('mapOS error:', e); }
          }
        })
        .catch(e => console.warn('refreshOS fetch error:', e));
    }
    window.__refreshOS = refreshOS;
    const interval = setInterval(refreshOS, 10000);
    refreshOS();
    return () => { clearInterval(interval); delete window.__refreshOS; };
  }, []);

  // Carrega OS reais do servidor (ou do dados_os.js estático)
  appUseEffect(() => {
    if (isStatic) {
      if (window.DADOS_OS && window.DADOS_OS.length) {
        try { setOsReais(window.DADOS_OS.map(mapOS)); } catch(e) { console.error('mapOS error:', e); }
      }
      setLoadingOS(false);
      return;
    }
    fetch('/api/os')
      .then(r => r.json())
      .then(d => {
        if (d.os && d.os.length > 0) {
          setOsReais(d.os.map(mapOS));
        }
        setLoadingOS(false);
      })
      .catch(() => {
        if (window.DADOS_OS && window.DADOS_OS.length) {
          try { setOsReais(window.DADOS_OS.map(mapOS)); } catch(e) {}
        }
        setLoadingOS(false);
      });
  }, []);

  function jumpToTable(filt) {
    if (filt && filt.open) {
      setOpenOS(filt.open);
      return;
    }
    setFilters({ ...(filt || {}) });
    setTab('os');
  }

  function goTo(t) {
    setTab(t);
  }

  const data = osReais || OS_LIST;
  const openOSObj = openOS ? data.find(x => x.id === openOS) : null;

  return (
    <div className={`app density-${t.density}`}>
      <Sidebar tab={tab} setTab={setTab} compact={t.showCompactSidebar}/>
      <main className="main">
        <TopBar tab={tab} monthLabel={t.monthLabel}/>
        <div className="main-scroll" data-screen-label={tab}>
          {tab === 'dashboard' && <Dashboard data={data} onJumpToTable={jumpToTable} onGoTo={goTo}/>}
          {tab === 'os' && <OSTable data={data} filters={filters} setFilters={setFilters} onOpenOS={(id) => setOpenOS(id)}/>}
          {tab === 'planejador' && <Planejador data={data} onOpenOS={(id) => setOpenOS(id)}/>}
          {tab === 'supervisao' && <Supervisao data={data}/>}
          {tab === 'gestao' && <Gestao data={data}/>}
          {tab === 'compras' && <Compras data={data} onOpenOS={(id) => setOpenOS(id)}/>}
          {tab === 'equipe' && <Equipe data={data} onJumpToTable={jumpToTable}/>}
          {tab === 'agenda' && <Agenda/>}
          {tab === 'altas' && <Altas/>}
          {tab === 'planilhas' && <Planilhas/>}
          {tab === 'importacao' && <Importacao/>}
          
          {tab === 'config' && <ConfigView/>}
        </div>
      </main>

      {openOSObj && <DetailDrawer os={openOSObj} allData={data} tecnicos={tecnicosLista} onClose={() => setOpenOS(null)} onSwitchOS={(id) => setOpenOS(id)}
        onRefresh={() => {
          fetch('/api/os').then(r=>r.json()).then(d => {
            if (d.os) {
              setOsReais(d.os.map(mapOS));
            }
          });
        }}/>}

      <TweaksPanel>
        <TweakSection label="Aparência"/>
        <TweakSelect label="Cor de destaque" value={t.accent}
          options={[
            { value: 'blue',   label: 'Azul' },
            { value: 'teal',   label: 'Verde-água' },
            { value: 'indigo', label: 'Índigo' },
            { value: 'slate',  label: 'Grafite' },
          ]}
          onChange={(v) => setTweak('accent', v)}/>
        <TweakRadio label="Densidade" value={t.density}
          options={['compact','regular','comfy']}
          onChange={(v) => setTweak('density', v)}/>
        <TweakToggle label="Sidebar compacta" value={t.showCompactSidebar}
          onChange={(v) => setTweak('showCompactSidebar', v)}/>
        <TweakSection label="Contexto"/>
        <TweakText label="Período" value={t.monthLabel}
          onChange={(v) => setTweak('monthLabel', v)}/>
      </TweaksPanel>
    </div>
  );
}

n.kudos-list{display:flex;flex-direction:column;gap:14px}\n.kudo{padding:14px 16px;border:1px solid var(--rule);background:var(--paper)}\n.kudo-name{font-family:var(--serif);font-size:17px;font-weight:700}\n.kudo-why{font-size:14px;color:var(--ink-2);margin-top:4px;font-style:italic}\n.footer{padding:40px 60px;border-top:4px double var(--ink);text-align:center}\n.footer-title{font-family:var(--serif);font-size:22px;font-style:italic;color:var(--ink-2)}\n.footer-meta{font-family:var(--ui);font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-2);margin-top:14px}\n@media(max-width:1100px){.front{grid-template-columns:1fr}.col-left,.col-right{border:0;padding:0;margin:0}.gallery{grid-template-columns:repeat(2,1fr)}.videos{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}.equipe-row{grid-template-columns:1fr}.mast-title{font-size:56px}.lead-headline{font-size:38px}.section{padding:36px 24px}.front{padding:30px 24px}}\n</style>\n</head>\n<body>\n<header class=\"mast\">\n  <div class=\"mast-top\">\n    <span>N\u00b0 8 \u00b7 Volume I</span>\n    <span class=\"mast-live\">edi\u00e7\u00e3o ao vivo \u00b7 atualizada \u00e0s 14:32</span>\n    <span>Sexta-feira, 22 de maio de 2026</span>\n  </div>\n  <h1 class=\"mast-title\">O <em>Jornal</em> da Manuten\u00e7\u00e3o</h1>\n  <div class=\"mast-sub\">TDGI \u00b7 Oficina 2 Predial \u00b7 Hospital Edmundo Vasconcelos</div>\n  <div class=\"mast-bar\">\n    <span>Edi\u00e7\u00e3o semanal</span>\n    <span>22 colaboradores \u00b7 1 hospital</span>\n    <span>tdgi.manutencao@teixeiraduarte.com</span>\n  </div>\n</header>\n<div class=\"ticker\">\n  <span class=\"ticker-label\">Agora no hospital</span>\n  <div class=\"ticker-track\">\n    <span class=\"ticker-item\"><span class=\"dot\"></span>Reparo emergencial em quadro el\u00e9trico \u00b7 Di\u00e1lise \u00b7 em andamento h\u00e1 22min</span>\n    <span class=\"ticker-item\"><span class=\"dot\"></span>Cadeira PS-403 trocada \u00b7 conclu\u00eddo \u00e0s 13:50 por Wescley Silva</span>\n    <span class=\"ticker-item\"><span class=\"dot\"></span>Aguardando pe\u00e7a do fornecedor Pollux para UTI Neonatal</span>\n    <span class=\"ticker-item\"><span class=\"dot\"></span>5 quartos liberados hoje \u00b7 vistoria m\u00e9dia 18min</span>\n    <span class=\"ticker-item\"><span class=\"dot\"></span>Christian Barbosa libera retrofit do quarto 412</span>\n    <span class=\"ticker-item\"><span class=\"dot\"></span>Reparo emergencial em quadro el\u00e9trico \u00b7 Di\u00e1lise \u00b7 em andamento h\u00e1 22min</span>\n    <span class=\"ticker-item\"><span class=\"dot\"></span>Cadeira PS-403 trocada \u00b7 conclu\u00eddo \u00e0s 13:50 por Wescley Silva</span>\n    <span class=\"ticker-item\"><span class=\"dot\"></span>Aguardando pe\u00e7a do fornecedor Pollux para UTI Neonatal</span>\n    <span class=\"ticker-item\"><span class=\"dot\"></span>5 quartos liberados hoje \u00b7 vistoria m\u00e9dia 18min</span>\n    <span class=\"ticker-item\"><span class=\"dot\"></span>Christian Barbosa libera retrofit do quarto 412</span>\n  </div>\n</div>\n<main class=\"front\">\n  <aside class=\"col-left\">\n    <div class=\"section-rule\">A semana em destaque</div>\n    <article class=\"story\"><div class=\"story-kicker\">Log\u00edstica</div><h3 class=\"story-hd\">Material da UTI Neonatal chega na pr\u00f3xima segunda</h3><div class=\"story-deck\">Ap\u00f3s cinco dias de atraso, fornecedor Pollux confirma entrega.</div><div class=\"story-foot\">Compras \u00b7 MAT-0055</div></article>\n    <article class=\"story\"><div class=\"story-kicker\">Pessoas</div><h3 class=\"story-hd\">Equipe ganha treinamento NR-35</h3><div class=\"story-deck\">19 t\u00e9cnicos certificados em trabalho em altura.</div><p class=\"story-body\">Os t\u00e9cnicos da Oficina 2 receberam reciclagem obrigat\u00f3ria durante tr\u00eas dias, garantindo continuidade dos servi\u00e7os em fachadas e tetos altos do hospital.</p><div class=\"story-foot\">RH \u00b7 18 a 20 de maio</div></article>\n    <article class=\"story\"><div class=\"story-kicker\">Opera\u00e7\u00e3o</div><h3 class=\"story-hd\">Hemodin\u00e2mica recebe aten\u00e7\u00e3o especial</h3><div class=\"story-deck\">IA aponta padr\u00e3o de re-trabalho em climatiza\u00e7\u00e3o.</div><p class=\"story-body\">73% das OS de climatiza\u00e7\u00e3o do setor originam do mesmo split. Avalia\u00e7\u00e3o t\u00e9cnica em curso para substitui\u00e7\u00e3o do equipamento.</p><div class=\"story-foot\">Diagn\u00f3stico \u00b7 19/05</div></article>\n    <article class=\"story\"><div class=\"story-kicker\">Cliente</div><h3 class=\"story-hd\">Hospital aprova dashboard de gest\u00e3o</h3><div class=\"story-deck\">Dire\u00e7\u00e3o e Ger\u00eancia de Infra ganham acesso ao Jornal.</div><div class=\"story-foot\">Comunica\u00e7\u00e3o \u00b7 21/05</div></article>\n  </aside>\n  <article class=\"lead\">\n    <div class=\"lead-kicker\">Manchete \u00b7 Opera\u00e7\u00e3o Predial</div>\n    <h1 class=\"lead-headline\">Vazamento na UTI Adulto contido em 12 minutos pela equipe de prontid\u00e3o</h1>\n    <p class=\"lead-deck\">Acionamento via WhatsApp \u00e0s 09:08 levou Antonio Fai\u00e3o ao quinto andar; servi\u00e7o encerrado \u00e0s 09:20 sem impacto a pacientes.</p>\n    <div class=\"lead-byline\">por Mateus Costa \u00b7 Planejador TDGI \u00b7 22 de maio, 14:00</div>\n    <div class=\"lead-photo\"><span class=\"lead-photo-icon\">\ud83d\udd27</span></div>\n    <div class=\"lead-caption\">Antonio Fai\u00e3o, t\u00e9cnico de hidr\u00e1ulica h\u00e1 quatro anos no contrato HEV, durante reparo no leito 514.</div>\n    <div class=\"lead-body\">\n      <p>O leito 514 da UTI Adulto apresentou vazamento sob a pia do banheiro \u00e0s nove da manh\u00e3 desta sexta-feira. A enfermagem acionou a manuten\u00e7\u00e3o pelo canal direto da TDGI, que despachou imediatamente o t\u00e9cnico de prontid\u00e3o.</p>\n      <p>Antonio Fai\u00e3o chegou ao local em quatro minutos. O registro de gaveta estava com veda\u00e7\u00e3o comprometida e foi substitu\u00eddo por pe\u00e7a em estoque. O processo foi conclu\u00eddo \u00e0s 09:20.</p>\n      <p>\"A prontid\u00e3o da equipe \u00e9 o que diferencia uma manuten\u00e7\u00e3o comum de uma manuten\u00e7\u00e3o hospitalar\", afirma o supervisor Paulo Mares. \"Doze minutos significa que o paciente n\u00e3o foi nem transferido de leito.\"</p>\n      <p>O caso entrou para o hist\u00f3rico de OS cr\u00edticas resolvidas dentro do SLA da TDGI no contrato HEV, que neste m\u00eas de maio est\u00e1 em 92%.</p>\n    </div>\n  </article>\n  <aside class=\"col-right\">\n    <div class=\"numbers\">\n      <div class=\"numbers-hd\">Maio em n\u00fameros \u00b7 at\u00e9 22/05</div>\n      <div class=\"num-row\"><div class=\"num-big\">812</div><div class=\"num-label\">OS recebidas</div></div>\n      <div class=\"num-row\"><div class=\"num-big\">587 <small>72%</small></div><div class=\"num-label\">Fechadas pela supervis\u00e3o</div></div>\n      <div class=\"num-row\"><div class=\"num-big\">92<small>%</small></div><div class=\"num-label\">SLA de cr\u00edticas no prazo</div></div>\n      <div class=\"num-row\"><div class=\"num-big\">6<small>h12</small></div><div class=\"num-label\">Tempo m\u00e9dio de execu\u00e7\u00e3o</div></div>\n      <div class=\"num-row\"><div class=\"num-big\">120</div><div class=\"num-label\">Leitos em controle de altas</div></div>\n    </div>\n    <div class=\"destaque\">\n      <div class=\"destaque-kicker\">Destaque da semana</div>\n      <h3 class=\"destaque-hd\">Antonio Fai\u00e3o</h3>\n      <p class=\"destaque-deck\">Fecha em m\u00e9dia 30% mais r\u00e1pido que a m\u00e9dia de sua especialidade. Em maio, 36 OS, 91% encerradas no mesmo turno.</p>\n      <div class=\"destaque-quote\">\"Doze minutos significa que o paciente n\u00e3o foi nem transferido de leito.\"</div>\n      <div class=\"destaque-attr\">Paulo Mares \u00b7 Supervisor de Hidr\u00e1ulica e Gases</div>\n    </div>\n    <article class=\"story\"><div class=\"story-kicker\">Estoque</div><h3 class=\"story-hd\">Junta de veda\u00e7\u00e3o 1/2 vira item permanente</h3><div class=\"story-deck\">Item pedido 14 vezes no trimestre passa a integrar estoque m\u00ednimo.</div><div class=\"story-foot\">Compras \u00b7 Jo\u00e3o Pereira</div></article>\n  </aside>\n</main>\n<section class=\"section\">\n  <div class=\"section-banner\"><h2>Galeria da <em>semana</em></h2><span class=\"section-banner-sub\">28 fotos \u00b7 WhatsApp</span></div>\n  <div class=\"gallery\">\n    <article class=\"gal-item\"><div class=\"gal-img gal-a\"><span class=\"gal-tag\">Antes/Depois</span></div><h4 class=\"gal-caption-hd\">Pintura do corredor do 5\u00ba andar</h4><div class=\"gal-caption-by\">Christian Barbosa \u00b7 19/05</div></article>\n    <article class=\"gal-item\"><div class=\"gal-img gal-b\"><span class=\"gal-tag\">Conclu\u00eddo</span></div><h4 class=\"gal-caption-hd\">Troca de lumin\u00e1rias do CC</h4><div class=\"gal-caption-by\">Matheus Henrique \u00b7 20/05</div></article>\n    <article class=\"gal-item\"><div class=\"gal-img gal-c\"><span class=\"gal-tag\">Preventiva</span></div><h4 class=\"gal-caption-hd\">Inspe\u00e7\u00e3o mensal da subesta\u00e7\u00e3o</h4><div class=\"gal-caption-by\">Jadson Alves \u00b7 20/05</div></article>\n    <article class=\"gal-item\"><div class=\"gal-img gal-d\"><span class=\"gal-tag\">Reforma</span></div><h4 class=\"gal-caption-hd\">Vesti\u00e1rio da equipe</h4><div class=\"gal-caption-by\">Walter Andr\u00e9 \u00b7 17 a 20/05</div></article>\n    <article class=\"gal-item\"><div class=\"gal-img gal-e\"><span class=\"gal-tag\">Cr\u00edtica</span></div><h4 class=\"gal-caption-hd\">Vazamento UTI Adulto leito 514</h4><div class=\"gal-caption-by\">Antonio Fai\u00e3o \u00b7 22/05</div></article>\n    <article class=\"gal-item\"><div class=\"gal-img gal-f\"><span class=\"gal-tag\">Gases</span></div><h4 class=\"gal-caption-hd\">Calibra\u00e7\u00e3o de man\u00f4metros O\u2082</h4><div class=\"gal-caption-by\">Andr\u00e9 Novaes \u00b7 16/05</div></article>\n    <article class=\"gal-item\"><div class=\"gal-img gal-g\"><span class=\"gal-tag\">Altas</span></div><h4 class=\"gal-caption-hd\">Quarto 412 liberado</h4><div class=\"gal-caption-by\">Christian Barbosa \u00b7 22/05</div></article>\n    <article class=\"gal-item\"><div class=\"gal-img gal-h\"><span class=\"gal-tag\">Cabista</span></div><h4 class=\"gal-caption-hd\">Novo ponto de rede no 6\u00ba</h4><div class=\"gal-caption-by\">Milton de Souza \u00b7 21/05</div></article>\n  </div>\n</section>\n<section class=\"section stats-section\">\n  <div class=\"section-banner\"><h2>O m\u00eas em <em>n\u00fameros</em></h2><span class=\"section-banner-sub\">comparativo abril \u2192 maio</span></div>\n  <div class=\"stats-grid\">\n    <div class=\"stat-cell\"><div class=\"stat-num\">812</div><div class=\"stat-label\">OS recebidas</div></div>\n    <div class=\"stat-cell\"><div class=\"stat-num\">587</div><div class=\"stat-label\">Fechadas pela supervis\u00e3o</div></div>\n    <div class=\"stat-cell\"><div class=\"stat-num\">92<small>%</small></div><div class=\"stat-label\">SLA cr\u00edtico no prazo</div></div>\n    <div class=\"stat-cell\"><div class=\"stat-num\">6<small>h12</small></div><div class=\"stat-label\">Tempo m\u00e9dio execu\u00e7\u00e3o</div></div>\n    <div class=\"stat-cell\"><div class=\"stat-num\">22</div><div class=\"stat-label\">Colaboradores</div></div>\n  </div>\n</section>\n<section class=\"section\">\n  <div class=\"section-banner\"><h2>Nossa <em>equipe</em></h2><span class=\"section-banner-sub\">22 colaboradores \u00b7 1 hospital</span></div>\n  <div class=\"equipe-row\">\n    <div class=\"equipe-card\">\n      <h3>Aniversariantes do m\u00eas</h3>\n      <div class=\"bday-list\">\n        <div class=\"bday-item\"><div class=\"bday-date\">22<br><small>mai</small></div><div class=\"bday-name\">Andr\u00e9 Novaes <em>\u00b7 Gases Medicinais</em></div><span class=\"bday-today\">hoje</span></div>\n        <div class=\"bday-item\"><div class=\"bday-date\">28<br><small>mai</small></div><div class=\"bday-name\">Jadson Alves <em>\u00b7 El\u00e9trica</em></div><span></span></div>\n        <div class=\"bday-item\"><div class=\"bday-date\">04<br><small>jun</small></div><div class=\"bday-name\">Lucas Felipe <em>\u00b7 Pintura</em></div><span></span></div>\n      </div>\n    </div>\n    <div class=\"equipe-card\">\n      <h3>Reconhecimentos</h3>\n      <div class=\"kudos-list\">\n        <div class=\"kudo\"><div class=\"kudo-name\">\u2b50 Antonio Fai\u00e3o</div><div class=\"kudo-why\">Reparo em 12min na UTI Adulto \u00b7 destaque do m\u00eas</div></div>\n        <div class=\"kudo\"><div class=\"kudo-name\">\ud83c\udfc6 Equipe de Walter Andr\u00e9</div><div class=\"kudo-why\">Reforma completa do vesti\u00e1rio entregue no prazo</div></div>\n        <div class=\"kudo\"><div class=\"kudo-name\">\ud83d\udcd0 Christian Barbosa</div><div class=\"kudo-why\">Tempo m\u00e9dio de vistoria de altas reduzido em 22%</div></div>\n        <div class=\"kudo\"><div class=\"kudo-name\">\ud83e\udd1d Paulo Mares</div><div class=\"kudo-why\">Cobertura do Walter durante f\u00e9rias sem perda de SLA</div></div>\n      </div>\n    </div>\n  </div>\n</section>\n<footer class=\"footer\">\n  <div class=\"footer-title\">O Jornal da Manuten\u00e7\u00e3o \u00b7 TDGI</div>\n  <div class=\"footer-meta\">Edi\u00e7\u00e3o N\u00b0 8 \u00b7 Maio 2026 \u00b7 Distribui\u00e7\u00e3o interna \u00b7 Hospital Edmundo Vasconcelos</div>\n</footer>\n</body>\n</html>"
